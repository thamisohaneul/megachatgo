<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MegaChat - Your Status</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI,sans-serif;
}

body{
  background:#0f0f14;
  overflow:hidden;
  color:white;
}

/* BACKGROUND */

.bg{
  position:absolute;
  width:100%;
  height:100%;

  background:
  linear-gradient(
    180deg,
    rgba(0,0,0,0.15),
    rgba(0,0,0,0.55)
  ),
  url('https://picsum.photos/900/1600?blur=1');

  background-size:cover;
  background-position:center;
}

/* TOP BAR */

.topbar{
  position:fixed;
  top:0;
  width:100%;

  padding:18px 18px 0;

  z-index:10;
}

/* PROGRESS */

.progress-area{
  display:flex;
  gap:6px;
}

/* BAR */

.bar{
  flex:1;
  height:4px;

  border-radius:20px;

  background:rgba(255,255,255,0.25);

  overflow:hidden;
}

.bar-fill{
  width:75%;
  height:100%;

  background:white;

  border-radius:20px;
}

/* USER AREA */

.user-area{
  margin-top:18px;

  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* LEFT */

.left{
  display:flex;
  align-items:center;
  gap:12px;
}

/* IMAGE */

.left img{
  width:54px;
  height:54px;

  border-radius:20px;

  object-fit:cover;

  border:3px solid rgba(255,255,255,0.2);
}

/* INFO */

.info{
  display:flex;
  flex-direction:column;
}

/* NAME */

.name{
  font-size:17px;
  font-weight:800;
}

/* TIME */

.time{
  margin-top:4px;

  font-size:12px;

  opacity:.8;
}

/* RIGHT */

.right{
  display:flex;
  gap:12px;
}

/* ICON */

.icon{
  width:44px;
  height:44px;

  border-radius:16px;

  background:rgba(255,255,255,0.12);

  backdrop-filter:blur(10px);

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:20px;
}

/* STATUS CONTENT */

.content{
  position:absolute;
  inset:0;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  text-align:center;

  padding:30px;
}

/* QUOTE CARD */

.quote-card{
  background:rgba(255,255,255,0.08);

  backdrop-filter:blur(14px);

  border:1px solid rgba(255,255,255,0.08);

  border-radius:36px;

  padding:30px 24px;

  width:100%;

  animation:fadeUp .6s ease;
}

/* EMOJI */

.emoji{
  font-size:52px;
}

/* QUOTE */

.quote{
  margin-top:20px;

  font-size:28px;
  font-weight:800;

  line-height:1.5;

  letter-spacing:-1px;
}

/* SMALL TEXT */

.small{
  margin-top:18px;

  font-size:14px;

  opacity:.85;

  line-height:1.7;
}

/* MUSIC CARD */

.music{
  margin-top:24px;

  background:rgba(255,255,255,0.08);

  border-radius:24px;

  padding:16px;

  display:flex;
  align-items:center;
  gap:14px;
}

/* MUSIC IMAGE */

.music img{
  width:62px;
  height:62px;

  border-radius:20px;

  object-fit:cover;
}

/* MUSIC INFO */

.music-info{
  flex:1;

  text-align:left;
}

/* SONG */

.song{
  font-size:15px;
  font-weight:700;
}

/* ARTIST */

.artist{
  margin-top:5px;

  font-size:12px;

  opacity:.8;
}

/* PLAY */

.play{
  width:52px;
  height:52px;

  border-radius:18px;

  background:linear-gradient(
    135deg,
    #8a2be2,
    #c084fc
  );

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:22px;
}

/* BOTTOM ACTIONS */

.bottom{
  position:fixed;
  bottom:24px;

  width:100%;

  padding:0 18px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  z-index:10;
}

/* REACT */

.react{
  display:flex;
  gap:12px;
}

/* REACTION */

.reaction{
  width:52px;
  height:52px;

  border-radius:18px;

  background:rgba(255,255,255,0.12);

  backdrop-filter:blur(12px);

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:24px;
}

/* MESSAGE */

.message{
  flex:1;

  margin-left:16px;

  height:56px;

  border:none;
  outline:none;

  border-radius:22px;

  background:rgba(255,255,255,0.12);

  backdrop-filter:blur(12px);

  padding:0 18px;

  color:white;

  font-size:14px;
}

/* PLACEHOLDER */

.message::placeholder{
  color:rgba(255,255,255,0.7);
}

/* ANIMATION */

@keyframes fadeUp{

  from{
    opacity:0;
    transform:translateY(14px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}

</style>
</head>

<body>

<!-- BACKGROUND -->

<div class="bg"></div>

<!-- TOP BAR -->

<div class="topbar">

  <!-- PROGRESS -->

  <div class="progress-area">

    <div class="bar">
      <div class="bar-fill"></div>
    </div>

    <div class="bar"></div>
    <div class="bar"></div>

  </div>

  <!-- USER -->

  <div class="user-area">

    <div class="left">

      <img src="https://i.pravatar.cc/300?img=15">

      <div class="info">

        <div class="name">
          Mega Creator
        </div>

        <div class="time">
          5 minutes ago
        </div>

      </div>

    </div>

    <div class="right">

      <div class="icon">
        ⋮
      </div>

      <div class="icon">
        ✕
      </div>

    </div>

  </div>

</div>

<!-- CONTENT -->

<div class="content">

  <div class="quote-card">

    <div class="emoji">
      ✨
    </div>

    <div class="quote">
      Building futuristic conversations for the next generation.
    </div>

    <div class="small">
      MegaChat Go is more than messaging — it's a new social experience 🚀
    </div>

    <!-- MUSIC -->

    <div class="music">

      <img src="https://picsum.photos/200?music">

      <div class="music-info">

        <div class="song">
          Night Drive
        </div>

        <div class="artist">
          Future Waves
        </div>

      </div>

      <div class="play">
        ▶
      </div>

    </div>

  </div>

</div>

<!-- BOTTOM -->

<div class="bottom">

  <div class="react">

    <div class="reaction">
      ❤️
    </div>

    <div class="reaction">
      🔥
    </div>

  </div>

  <input
  class="message"
  type="text"
  placeholder="Reply to status...">

</div>

</body>
</html>
