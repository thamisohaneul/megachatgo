<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>MegaChat Chatroom</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI,sans-serif;
}

body{
  background:#fafafa; /* SAME AS HOME.HTML */
  overflow:hidden;
  color:#111;
}

/* HEADER */

.header{
  position:fixed;
  top:0;
  left:0;
  right:0;

  height:86px;

  background:rgba(255,255,255,.96);

  backdrop-filter:blur(18px);

  border-bottom:1px solid #ececec;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 16px;

  z-index:100;
}

/* LEFT */

.left{
  display:flex;
  align-items:center;

  gap:14px;
}

/* BACK */

.back-btn{
  width:42px;
  height:42px;

  border-radius:16px;

  background:#f3f3f3;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:22px;

  transition:.25s ease;
}

/* PROFILE */

.profile{
  width:54px;
  height:54px;

  border-radius:20px;

  object-fit:cover;

  border:2px solid #8a2be2;
}

/* USER */

.user-info{
  display:flex;
  flex-direction:column;
}

.username{
  font-size:17px;
  font-weight:900;
}

.status{
  margin-top:4px;

  font-size:12px;

  color:#777;
}

/* RIGHT */

.right{
  display:flex;
  align-items:center;

  gap:10px;
}

/* ICON */

.icon{
  width:42px;
  height:42px;

  border-radius:16px;

  background:#f3f3f3;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:20px;

  transition:.25s ease;
}

/* CHAT AREA */

.chat-area{
  position:absolute;

  top:86px;
  bottom:84px;
  left:0;
  right:0;

  overflow-y:auto;

  padding:18px 14px;
}

/* MESSAGE */

.message{
  max-width:78%;

  padding:14px 16px;

  border-radius:24px;

  margin-bottom:14px;

  font-size:14px;

  line-height:1.7;

  animation:fade .25s ease;
}

/* RECEIVED */

.received{
  background:white;

  color:#111;

  border-bottom-left-radius:8px;

  box-shadow:
  0 6px 18px rgba(0,0,0,.05);
}

/* SENT */

.sent{
  background:linear-gradient(
    135deg,
    #8a2be2,
    #c084fc
  );

  color:white;

  margin-left:auto;

  border-bottom-right-radius:8px;
}

/* TIME */

.time{
  margin-top:8px;

  font-size:11px;

  opacity:.75;

  text-align:right;
}

/* INPUT BAR */

.input-bar{
  position:fixed;

  bottom:0;
  left:0;
  right:0;

  height:84px; /* REDUCED SIZE */

  background:rgba(255,255,255,.96);

  backdrop-filter:blur(18px);

  border-top:1px solid #ececec;

  display:flex;
  align-items:center;

  padding:0 2px;

  gap:1px;
}

/* SMALL BUTTON */

.small-btn{
  width:44px; /* SMALLER */
  height:44px;

  border-radius:16px;

  background:#f3f3f3;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:20px;

  transition:.25s ease;

  flex-shrink:0;
}

/* SMALL BUTTON IMAGES */

.small-btn img{
  width:22px;
  height:22px;
}

/* RECORDING */

.recording{
  background:#ff375f !important;

  animation:pulse 1s infinite;
}

/* INPUT */

.input{
  flex:1;

  height:48px; /* SMALLER */

  border:none;
  outline:none;

  border-radius:18px;

  background:#f3f3f3;

  padding:0 16px;

  color:#111;

  font-size:14px;
}

/* SEND */

.send-btn{
  width:48px;
  height:48px;

  border-radius:18px;

  background:linear-gradient(
    135deg,
    #8a2be2,
    #c084fc
  );

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:22px;

  color:white;

  box-shadow:
  0 10px 24px rgba(138,43,226,.28);

  transition:.25s ease;

  flex-shrink:0;
}

/* ACTIVE */

.icon:active,
.back-btn:active,
.small-btn:active,
.send-btn:active{
  transform:scale(.90);
}

/* ANIMATION */

@keyframes fade{

  from{
    opacity:0;
    transform:translateY(10px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}

@keyframes pulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.06);
  }

  100%{
    transform:scale(1);
  }

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

  <div class="left">

    <div
    class="back-btn"
    onclick="goBack()">
      ←
    </div>

    <img
    class="profile"
    src="https://i.pravatar.cc/150?img=5">

    <div class="user-info">

      <div class="username">
        Mega Creator
      </div>

      <div class="status">
        Active now
      </div>

    </div>

  </div>

  <!-- RIGHT -->

  <div class="right">

    <div
    class="icon"
    onclick="openSettings()">
      ⚙
    </div>

    <div
    class="icon"
    onclick="startVideoCall()">
      <img src="video-call.png"
      width="22">
    </div>

    <div
    class="icon"
    onclick="startAudioCall()">
      📞
    </div>

  </div>

</div>

<!-- CHAT AREA -->

<div
class="chat-area"
id="chatArea">

  <!-- RECEIVED -->

  <div class="message received">

    Hey 👋 welcome to MegaChat.

    <div class="time">
      09:22
    </div>

  </div>

  <!-- SENT -->

  <div class="message sent">

    This UI looks amazing 🚀

    <div class="time">
      09:23
    </div>

  </div>

</div>

<!-- INPUT BAR -->

<div class="input-bar">

  <!-- PLUS -->

  <div
  class="small-btn"
  onclick="openFiles()">
    ＋
  </div>

  <!-- RECORD -->

  <div
  class="small-btn"
  id="recordBtn"
  onclick="toggleRecording()">

    <img src="voice-call.png">

  </div>

  <!-- INPUT -->

  <input
  type="text"
  id="messageInput"
  class="input"
  placeholder="Type a message...">

  <!-- SEND -->

  <div
  class="send-btn"
  onclick="sendMessage()">
    ➤
  </div>

</div>

<script>

/* CHAT */

const chatArea =
document.getElementById("chatArea")

const messageInput =
document.getElementById("messageInput")

const recordBtn =
document.getElementById("recordBtn")

let recording = false

/* TAP EFFECT */

function tapEffect(element){

  element.style.transform =
  "scale(.90)"

  setTimeout(()=>{

    element.style.transform =
    "scale(1)"

  },180)

}

/* BACK */

function goBack(){

  history.back()

}

/* SETTINGS */

function openSettings(){

  window.location.href =
  "profilesettings.html"

}

/* VIDEO CALL */

function startVideoCall(){

  alert("Starting video call 🎥")

}

/* AUDIO CALL */

function startAudioCall(){

  alert("Starting audio call 📞")

}

/* OPEN FILES */

function openFiles(){

  window.location.href =
  "chatfile.html"

}

/* RECORDING */

function toggleRecording(){

  tapEffect(recordBtn)

  recording = !recording

  if(recording){

    recordBtn.classList.add(
    "recording")

    recordBtn.innerHTML = "⏺"

    alert("Voice recording started 🎤")

  }

  else{

    recordBtn.classList.remove(
    "recording")

    recordBtn.innerHTML =
    '<img src="voice-call.png">'

    alert("Recording stopped")

  }

}

/* SEND MESSAGE */

function sendMessage(){

  const message =
  messageInput.value.trim()

  /* SEND TEXT */

  if(message !== ""){

    const msg =
    document.createElement("div")

    msg.className =
    "message sent"

    msg.innerHTML = `

      ${message}

      <div class="time">
        Just now
      </div>

    `

    chatArea.appendChild(msg)

    messageInput.value = ""

    chatArea.scrollTop =
    chatArea.scrollHeight

  }

  /* SEND VOICE */

  if(recording){

    const voice =
    document.createElement("div")

    voice.className =
    "message sent"

    voice.innerHTML = `

      🎤 Voice message

      <div class="time">
        Sent now
      </div>

    `

    chatArea.appendChild(voice)

    chatArea.scrollTop =
    chatArea.scrollHeight

    recording = false

    recordBtn.classList.remove(
    "recording")

    recordBtn.innerHTML =
    '<img src="voice-call.png">'

  }

}

/* ENTER KEY */

messageInput.addEventListener(
"keypress",
function(e){

  if(e.key === "Enter"){

    sendMessage()

  }

})

</script>

<script>

/* USER SYSTEM */
/* ===================================== */

localStorage.getItem(
"opened_user_id"
) || "default_user"

)

)

type="text",
side="sent"
){

  chatArea.scrollHeight

  window.location.href =

  alert(
  "Starting video call 🎥"

  "Starting audio call 📞"
  )

}

  "chatfile.html"

}

/* ===================================== */

  if(recording){

    recordBtn.classList.add(
    "recording")

    recordBtn.innerHTML =

    messageInput.value = ""

    loadConversation()

  /* VOICE MESSAGE */

  if(recording){

    saveMessage(

    )

    recording = false

    recordBtn.classList.remove(

<script>

/* ===================================== */
/* USER ID */
/* ===================================== */

const userId =
localStorage.getItem(
"opened_user_id"
) || "default_user"

/* ===================================== */
/* ELEMENTS */
/* ===================================== */

const chatArea =
document.getElementById(
"chatArea"
)

const messageInput =
document.getElementById(
"messageInput"
)

const recordBtn =
document.getElementById(
"recordBtn"
)

let recording = false

/* ===================================== */
/* LOAD USER */
/* ===================================== */

window.onload = function(){

  const userName =
  localStorage.getItem(
  "chat_user_name"
  )

  const userPicture =
  localStorage.getItem(
  "chat_user_picture"
  )

  if(userName){

    document.querySelector(
    ".username"
    ).innerHTML =
    userName

  }

  if(userPicture){

    document.querySelector(
    ".profile"
    ).src =
    userPicture

  }

  loadConversation()

}

/* ===================================== */
/* SAVE MESSAGE */
/* ===================================== */

function saveMessage(
content,
type="text",
side="sent"
){

  const messages =
  JSON.parse(
    localStorage.getItem(
      "chat_" + userId
    )
  ) || []

  messages.push({

    content:content,

    type:type,

    side:side,

    time:new Date().toLocaleTimeString([],{
      hour:"2-digit",
      minute:"2-digit"
    })

  })

  localStorage.setItem(

    "chat_" + userId,

    JSON.stringify(messages)

  )

}

/* ===================================== */
/* LOAD CHAT */
/* ===================================== */

function loadConversation(){

  chatArea.innerHTML = ""

  const messages =
  JSON.parse(
    localStorage.getItem(
      "chat_" + userId
    )
  ) || []

  messages.forEach(msg=>{

    const div =
    document.createElement("div")

    div.className =
    "message " + msg.side

    /* NORMAL MESSAGE */

    if(msg.type === "text" ||
       msg.type === "voice"){

      div.innerHTML = `

        ${msg.content}

        <div class="time">
          ${msg.time}
        </div>

      `

    }

    /* POLL MESSAGE */

    if(msg.type === "poll"){

      div.innerHTML = `

      <div style="
      font-weight:800;
      margin-bottom:12px;
      ">
      📊 ${msg.question}
      </div>

      ${msg.options.map((option,index)=>`

      <div
      onclick="votePoll(${msg.id},${index})"

      style="
      padding:12px;
      background:#f3f3f3;
      border-radius:14px;
      margin-bottom:10px;
      cursor:pointer;
      ">

      ${option.text}

      <div style="
      margin-top:6px;
      font-size:12px;
      color:#777;
      ">
      ${option.votes} votes
      </div>

      </div>

      `).join("")}

      <div class="time">
      ${msg.time}
      </div>

      `

    }

    chatArea.appendChild(div)

  })

  chatArea.scrollTop =
  chatArea.scrollHeight

}

/* ===================================== */
/* SEND MESSAGE */
/* ===================================== */

function sendMessage(){

  const message =
  messageInput.value.trim()

  if(message !== ""){

    saveMessage(
      message,
      "text",
      "sent"
    )

    messageInput.value = ""

    loadConversation()

  }

  if(recording){

    saveMessage(

      "🎤 Voice Message",

      "voice",

      "sent"

    )

    recording = false

    recordBtn.classList.remove(
    "recording"
    )

    recordBtn.innerHTML =
    '<img src="voice-call.png">'

    loadConversation()

  }

}

/* ===================================== */
/* CREATE POLL */
/* ===================================== */

function createPoll(){

  const question =
  prompt(
  "Enter poll question"
  )

  if(!question) return

  const option1 =
  prompt("Option 1")

  if(!option1) return

  const option2 =
  prompt("Option 2")

  if(!option2) return

  const messages =
  JSON.parse(
    localStorage.getItem(
    "chat_" + userId
    )
  ) || []

  messages.push({

    id:Date.now(),

    type:"poll",

    side:"sent",

    question:question,

    options:[

      {
        text:option1,
        votes:0
      },

      {
        text:option2,
        votes:0
      }

    ],

    time:new Date().toLocaleTimeString([],{
      hour:"2-digit",
      minute:"2-digit"
    })

  })

  localStorage.setItem(

    "chat_" + userId,

    JSON.stringify(messages)

  )

  loadConversation()

}

/* ===================================== */
/* VOTE POLL */
/* ===================================== */

function votePoll(
pollId,
optionIndex
){

  const messages =
  JSON.parse(
    localStorage.getItem(
    "chat_" + userId
    )
  ) || []

  const poll =
  messages.find(
  m => m.id === pollId
  )

  if(!poll) return

  poll.options[
  optionIndex
  ].votes += 1

  localStorage.setItem(

    "chat_" + userId,

    JSON.stringify(messages)

  )

  loadConversation()

}

/* ===================================== */
/* RECORDING */
/* ===================================== */

function toggleRecording(){

  recording = !recording

  if(recording){

    recordBtn.classList.add(
    "recording"
    )

    recordBtn.innerHTML =
    "⏺"

  }

  else{

    recordBtn.classList.remove(
    "recording"
    )

    recordBtn.innerHTML =
    '<img src="voice-call.png">'

  }

}

/* ===================================== */
/* ENTER KEY */
/* ===================================== */

messageInput.addEventListener(
"keypress",
function(e){

  if(e.key === "Enter"){

    sendMessage()

  }

})

/* ===================================== */
/* NAVIGATION */
/* ===================================== */

function goBack(){

  history.back()

}

function openSettings(){

  window.location.href =
  "profilesettings.html"

}

function startVideoCall(){

  alert(
  "Starting video call 🎥"
  )

}

function startAudioCall(){

  alert(
  "Starting audio call 📞"
  )

}

function openFiles(){

  createPoll()

}

</script>
</body>
</html>
