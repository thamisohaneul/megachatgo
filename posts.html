<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,
initial-scale=1.0,
viewport-fit=cover">

<title>MegaChat Posts</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI,sans-serif;
}

body{
  background:#f6f6f8;
  color:#111;
  overflow-x:hidden;
}

/* HEADER */

.header{
  position:fixed;
  top:0;
  left:0;
  right:0;

  height:88px;

  background:
  rgba(255,255,255,.96);

  backdrop-filter:blur(18px);

  border-bottom:
  1px solid #ececec;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 16px;

  z-index:999;
}

/* LEFT */

.header-left{
  display:flex;
  align-items:center;
  gap:14px;
}

.back-btn{
  width:48px;
  height:48px;

  border-radius:18px;

  background:#f3f3f3;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:24px;

  transition:.2s;
}

.page-title{
  font-size:26px;
  font-weight:900;

  background:linear-gradient(
  135deg,
  #8a2be2,
  #c084fc
  );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* CONTENT */

.content{
  padding:
  106px 14px 40px;
}

/* POST */

.post{
  background:white;

  border-radius:34px;

  overflow:hidden;

  margin-bottom:22px;

  box-shadow:
  0 10px 28px rgba(0,0,0,.05);
}

/* TOP */

.post-top{
  padding:16px;

  display:flex;
  justify-content:space-between;
  align-items:center;
}

.user{
  display:flex;
  align-items:center;
  gap:12px;
}

.user img{
  width:56px;
  height:56px;

  border-radius:20px;

  object-fit:cover;
}

.user-info{
  display:flex;
  flex-direction:column;
}

.username{
  font-size:16px;
  font-weight:800;
}

.post-time{
  margin-top:4px;

  font-size:12px;

  color:#888;
}

/* IMAGE */

.post-image{
  width:100%;
  height:430px;

  object-fit:cover;
}

/* CAPTION */

.caption{
  padding:16px 18px 6px;

  font-size:14px;

  line-height:1.6;

  color:#444;
}

/* ACTIONS */

.actions{
  display:flex;
  justify-content:space-around;
  align-items:center;

  padding:16px 8px 18px;
}

.action-btn{
  display:flex;
  align-items:center;
  gap:8px;

  min-width:70px;

  height:48px;

  padding:0 14px;

  border-radius:18px;

  background:#f5f5f7;

  font-size:14px;
  font-weight:700;

  transition:.2s;
}

.action-icon{
  font-size:18px;
}

/* COMMENT PANEL */

.comment-panel{
  position:fixed;
  left:0;
  right:0;
  bottom:-100%;

  height:65vh;

  background:white;

  border-radius:32px 32px 0 0;

  z-index:9999;

  transition:.35s ease;

  display:flex;
  flex-direction:column;
}

.comment-panel.show{
  bottom:0;
}

.comment-header{
  padding:20px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  border-bottom:
  1px solid #eee;
}

.comment-title{
  font-size:22px;
  font-weight:900;
}

.close-btn{
  width:42px;
  height:42px;

  border-radius:16px;

  background:#f3f3f3;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:22px;
}

/* COMMENTS */

.comments{
  flex:1;

  overflow-y:auto;

  padding:18px;
}

.comment{
  background:#f7f7fa;

  border-radius:22px;

  padding:14px;

  margin-bottom:14px;
}

.comment-name{
  font-size:14px;
  font-weight:800;
}

.comment-text{
  margin-top:6px;

  font-size:14px;

  color:#555;
}

/* INPUT */

.comment-input-bar{
  padding:14px;

  display:flex;
  gap:10px;

  border-top:
  1px solid #eee;
}

.comment-input{
  flex:1;

  height:54px;

  border:none;
  outline:none;

  border-radius:20px;

  background:#f3f3f3;

  padding:0 16px;

  font-size:15px;
}

.send-btn{
  width:54px;
  height:54px;

  border-radius:20px;

  background:linear-gradient(
  135deg,
  #8a2be2,
  #c084fc
  );

  color:white;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:22px;
}

/* SHARE PANEL */

.share-panel{
  position:fixed;
  left:0;
  right:0;
  bottom:-100%;

  background:white;

  border-radius:32px 32px 0 0;

  padding:22px;

  z-index:99999;

  transition:.35s ease;
}

.share-panel.show{
  bottom:0;
}

.share-title{
  font-size:22px;
  font-weight:900;

  margin-bottom:18px;
}

.share-option{
  height:60px;

  border-radius:22px;

  background:#f5f5f7;

  margin-bottom:14px;

  display:flex;
  align-items:center;

  padding:0 18px;

  font-size:15px;
  font-weight:700;

  transition:.2s;
}

/* TAP */

.back-btn:active,
.action-btn:active,
.close-btn:active,
.send-btn:active,
.share-option:active{
  transform:scale(.94);
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

  <div class="header-left">

    <div
    class="back-btn"
    onclick="goBack()">
      ←
    </div>

    <div class="page-title">
      Posts
    </div>

  </div>

</div>

<!-- CONTENT -->

<div class="content" id="feed"></div>

<!-- COMMENT PANEL -->

<div
class="comment-panel"
id="commentPanel">

  <div class="comment-header">

    <div class="comment-title">
      Comments
    </div>

    <div
    class="close-btn"
    onclick="closeComments()">
      ✕
    </div>

  </div>

  <div
  class="comments"
  id="commentsContainer"></div>

  <div class="comment-input-bar">

    <input
    type="text"
    id="commentInput"
    class="comment-input"
    placeholder="Write a comment...">

    <div
    class="send-btn"
    onclick="sendComment()">
      ➤
    </div>

  </div>

</div>

<!-- SHARE PANEL -->

<div
class="share-panel"
id="sharePanel">

  <div class="share-title">
    Share Post
  </div>

  <div
  class="share-option"
  onclick="shareToFriend()">
    📤 Share to Friend
  </div>

  <div
  class="share-option"
  onclick="savePostImage()">
    💾 Save to Device
  </div>

  <div
  class="share-option"
  onclick="copyPostLink()">
    🔗 Copy Link
  </div>

</div>

<script>

/* POSTS */

let posts = [

  {

    id:"post_1",

    userId:"alex_001",

    name:"Alex Morgan",

    picture:
    "https://i.pravatar.cc/150?img=2",

    image:
    "https://picsum.photos/500/700?1",

    caption:
    "Beautiful sunset vibes ✨",

    time:"10 mins ago"

  },

  {

    id:"post_2",

    userId:"sarah_001",

    name:"Sarah Lee",

    picture:
    "https://i.pravatar.cc/150?img=3",

    image:
    "https://picsum.photos/500/700?2",

    caption:
    "MegaChat moments 💜",

    time:"32 mins ago"

  }

]

const feed =
document.getElementById("feed")

let activePostId = null
let activePostImage = null

/* RENDER */

function renderPosts(){

  feed.innerHTML = ""

  posts.forEach(post=>{

    let likes =
    JSON.parse(
    localStorage.getItem(
    "likes_" + post.id
    )) || []

    let comments =
    JSON.parse(
    localStorage.getItem(
    "comments_" + post.id
    )) || []

    feed.innerHTML += `

      <div class="post">

        <div class="post-top">

          <div
          class="user"
          onclick="
          openProfile(
          '${post.userId}'
          )">

            <img src="${post.picture}">

            <div class="user-info">

              <div class="username">
                ${post.name}
              </div>

              <div class="post-time">
                ${post.time}
              </div>

            </div>

          </div>

        </div>

        <img
        class="post-image"
        src="${post.image}"
        onclick="
        openImage(
        '${post.image}'
        )">

        <div class="caption">
          ${post.caption}
        </div>

        <div class="actions">

          <div
          class="action-btn"
          onclick="
          likePost(
          '${post.id}',
          this
          )">

            <div class="action-icon">
              ❤️
            </div>

            <span id="likes_${post.id}">
              ${likes.length}
            </span>

          </div>

          <div
          class="action-btn"
          onclick="
          openComments(
          '${post.id}'
          )">

            <div class="action-icon">
              💬
            </div>

            ${comments.length}

          </div>

          <div
          class="action-btn"
          onclick="
          openShare(
          '${post.id}',
          '${post.image}'
          )">

            <div class="action-icon">
              📤
            </div>

            Share

          </div>

        </div>

      </div>

    `

  })

}

renderPosts()

/* LIKE */

function likePost(id,btn){

  let myId =
  localStorage.getItem(
  "my_user_id"
  ) || "you_001"

  let likes =
  JSON.parse(
  localStorage.getItem(
  "likes_" + id
  )) || []

  if(likes.includes(myId)){

    likes =
    likes.filter(
    x => x !== myId
    )

    btn.style.background =
    "#f5f5f7"

  }

  else{

    likes.push(myId)

    btn.style.background =
    "#f3e8ff"

  }

  localStorage.setItem(
  "likes_" + id,
  JSON.stringify(likes)
  )

  document.getElementById(
  "likes_" + id
  ).innerHTML =
  likes.length

}

/* COMMENTS */

function openComments(id){

  activePostId = id

  document.getElementById(
  "commentPanel"
  ).classList.add("show")

  loadComments()

}

function closeComments(){

  document.getElementById(
  "commentPanel"
  ).classList.remove("show")

}

function loadComments(){

  let comments =
  JSON.parse(
  localStorage.getItem(
  "comments_" + activePostId
  )) || []

  const container =
  document.getElementById(
  "commentsContainer"
  )

  container.innerHTML = ""

  comments.forEach(c=>{

    container.innerHTML += `

      <div class="comment">

        <div class="comment-name">
          ${c.name}
        </div>

        <div class="comment-text">
          ${c.text}
        </div>

      </div>

    `

  })

}

function sendComment(){

  const input =
  document.getElementById(
  "commentInput"
  )

  let text =
  input.value.trim()

  if(text === "") return

  let comments =
  JSON.parse(
  localStorage.getItem(
  "comments_" + activePostId
  )) || []

  comments.push({

    name:"You",

    text:text

  })

  localStorage.setItem(
  "comments_" + activePostId,
  JSON.stringify(comments)
  )

  input.value = ""

  loadComments()

  renderPosts()

}

/* SHARE */

function openShare(id,image){

  activePostId = id
  activePostImage = image

  document.getElementById(
  "sharePanel"
  ).classList.add("show")

}

function closeShare(){

  document.getElementById(
  "sharePanel"
  ).classList.remove("show")

}

function shareToFriend(){

  closeShare()

  localStorage.setItem(
  "shared_post_image",
  activePostImage
  )

  window.location.href =
  "chat.html"

}

function savePostImage(){

  const a =
  document.createElement("a")

  a.href = activePostImage

  a.download =
  "MegaChat_Post.jpg"

  a.click()

  closeShare()

}

function copyPostLink(){

  navigator.clipboard.writeText(
  activePostImage
  )

  closeShare()

}

/* IMAGE */

function openImage(image){

  window.open(image)

}

/* PROFILE */

function openProfile(id){

  localStorage.setItem(
  "opened_profile_id",
  id
  )

  window.location.href =
  "profile.html"

}

/* BACK */

function goBack(){

  window.location.href =
  "home.html"

}

</script>

</body>
</html>
