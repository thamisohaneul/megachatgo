<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>MegaChat Chatroom</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI,sans-serif;
}

body{
  background:#fafafa;
  overflow:hidden;
  color:#111;
}

/* HEADER */

.header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:86px;
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(18px);
  border-bottom:1px solid #ececec;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  z-index:100;
}

.left{
  display:flex;
  align-items:center;
  gap:14px;
}

.back-btn{
  width:42px;
  height:42px;
  border-radius:16px;
  background:#f3f3f3;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:22px;
}

.profile{
  width:54px;
  height:54px;
  border-radius:20px;
  object-fit:cover;
  border:2px solid #8a2be2;
}

.user-info{
  display:flex;
  flex-direction:column;
}

.username{
  font-size:17px;
  font-weight:900;
}

.status{
  margin-top:4px;
  font-size:12px;
  color:#777;
}

/* CHAT AREA */

.chat-area{
  position:absolute;
  top:86px;
  bottom:84px;
  left:0;
  right:0;
  overflow-y:auto;
  padding:18px 14px;
}

.message{
  max-width:78%;
  padding:14px 16px;
  border-radius:24px;
  margin-bottom:14px;
  font-size:14px;
  line-height:1.7;
}

.received{
  background:white;
  color:#111;
  border-bottom-left-radius:8px;
  box-shadow:0 6px 18px rgba(0,0,0,.05);
}

.sent{
  background:linear-gradient(
  135deg,
  #8a2be2,
  #c084fc
  );
  color:white;
  margin-left:auto;
  border-bottom-right-radius:8px;
}

.time{
  margin-top:8px;
  font-size:11px;
  opacity:.75;
  text-align:right;
}

/* INPUT */

.input-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:84px;
  background:white;
  border-top:1px solid #ececec;
  display:flex;
  align-items:center;
  padding:0 10px;
  gap:10px;
}

.input{
  flex:1;
  height:48px;
  border:none;
  outline:none;
  border-radius:18px;
  background:#f3f3f3;
  padding:0 16px;
  font-size:14px;
}

.send-btn{
  width:48px;
  height:48px;
  border-radius:18px;
  background:linear-gradient(
  135deg,
  #8a2be2,
  #c084fc
  );
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:22px;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

  <div class="left">

    <div
    class="back-btn"
    onclick="goBack()">
      ←
    </div>

    <img
    class="profile"
    id="profileImage"
    src="https://i.pravatar.cc/150?img=2">

    <div class="user-info">

      <div
      class="username"
      id="chatUsername">
        User
      </div>

      <div class="status">
        Active now
      </div>

    </div>

  </div>

</div>

<!-- CHAT AREA -->

<div
class="chat-area"
id="chatArea">
</div>

<!-- INPUT BAR -->

<div class="input-bar">

  <input
  type="text"
  id="messageInput"
  class="input"
  placeholder="Type a message...">

  <div
  class="send-btn"
  onclick="sendMessage()">
    ➤
  </div>

</div>

<script>

/* USER ID */

const userId =
localStorage.getItem(
"opened_user_id"
) || "default_user"

/* ELEMENTS */

const chatArea =
document.getElementById(
"chatArea"
)

const messageInput =
document.getElementById(
"messageInput"
)

/* LOAD USER */

window.onload = function(){

  const userName =
  localStorage.getItem(
  "chat_user_name"
  )

  const userPicture =
  localStorage.getItem(
  "chat_user_picture"
  )

  if(userName){

    document.getElementById(
    "chatUsername"
    ).innerHTML =
    userName

  }

  if(userPicture){

    document.getElementById(
    "profileImage"
    ).src =
    userPicture

  }

  loadConversation()

}

/* SAVE MESSAGE */

function saveMessage(
content,
side="sent"
){

  const messages =
  JSON.parse(
    localStorage.getItem(
    "chat_" + userId
    )
  ) || []

  messages.push({

    content:content,

    side:side,

    time:new Date().toLocaleTimeString([],{
      hour:"2-digit",
      minute:"2-digit"
    })

  })

  localStorage.setItem(

    "chat_" + userId,

    JSON.stringify(messages)

  )

}

/* LOAD CHAT */

function loadConversation(){

  chatArea.innerHTML = ""

  const messages =
  JSON.parse(
    localStorage.getItem(
    "chat_" + userId
    )
  ) || []

  messages.forEach(msg=>{

    const div =
    document.createElement("div")

    div.className =
    "message " + msg.side

    div.innerHTML = `

      ${msg.content}

      <div class="time">
        ${msg.time}
      </div>

    `

    chatArea.appendChild(div)

  })

  chatArea.scrollTop =
  chatArea.scrollHeight

}

/* SEND */

function sendMessage(){

  const message =
  messageInput.value.trim()

  if(message === "") return

  saveMessage(
  message,
  "sent"
  )

  messageInput.value = ""

  loadConversation()

}

/* ENTER KEY */

messageInput.addEventListener(
"keypress",
function(e){

  if(e.key === "Enter"){

    sendMessage()

  }

})

/* BACK */

function goBack(){

  history.back()

}

</script>

</body>
</html>
