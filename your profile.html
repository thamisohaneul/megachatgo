<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MegaChat - Your Profile</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI,sans-serif;
}

body{
  background:#f6f6f8;
  color:#111;
  overflow-x:hidden;
}

/* HEADER */

.header{
  position:fixed;
  top:0;
  width:100%;
  height:80px;

  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(14px);

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:0 18px;

  border-bottom:1px solid #ececec;

  z-index:100;
}

/* TITLE */

.title{
  font-size:31px;
  font-weight:800;
  letter-spacing:-1px;
}

/* HEADER ICONS */

.header-icons{
  display:flex;
  gap:18px;
}

.header-icons div{
  font-size:24px;
}

/* PROFILE CONTAINER */

.profile{
  margin-top:100px;
  padding:0 16px 120px;
}

/* PROFILE CARD */

.profile-card{
  background:white;

  border-radius:34px;

  padding:22px;

  box-shadow:
  0 8px 30px rgba(0,0,0,0.04);

  animation:fadeUp .5s ease;
}

/* TOP AREA */

.profile-top{
  display:flex;
  align-items:center;
  gap:18px;
}

/* IMAGE */

.profile-image{
  position:relative;
}

.profile-image img{
  width:110px;
  height:110px;

  border-radius:32px;

  object-fit:cover;

  border:4px solid white;

  box-shadow:
  0 10px 24px rgba(0,0,0,0.08);
}

/* STATUS DOT */

.status{
  position:absolute;
  bottom:6px;
  right:6px;

  width:22px;
  height:22px;

  border-radius:50%;

  background:#8a2be2;

  border:4px solid white;
}

/* INFO */

.profile-info{
  flex:1;
}

/* NAME */

.name{
  font-size:28px;
  font-weight:800;
}

/* USERNAME */

.username{
  margin-top:4px;

  color:#777;
  font-size:14px;
}

/* BIO */

.bio{
  margin-top:14px;

  line-height:1.6;
  font-size:14px;
}

/* NOTE */

.note{
  margin-top:18px;

  background:#f5f1ff;

  border-radius:22px;

  padding:15px;

  display:flex;
  align-items:center;
  gap:12px;
}

/* NOTE ICON */

.note-icon{
  width:46px;
  height:46px;

  border-radius:16px;

  background:linear-gradient(
    135deg,
    #8a2be2,
    #c084fc
  );

  display:flex;
  justify-content:center;
  align-items:center;

  color:white;
  font-size:22px;
}

/* NOTE TEXT */

.note-text{
  font-size:14px;
  line-height:1.5;
}

/* STATS */

.stats{
  margin-top:22px;

  display:flex;
  justify-content:space-between;
}

/* STAT */

.stat{
  flex:1;
  text-align:center;
}

.stat-number{
  font-size:22px;
  font-weight:800;
}

.stat-label{
  margin-top:5px;

  font-size:13px;
  color:#777;
}

/* BUTTONS */

.buttons{
  display:flex;
  gap:12px;

  margin-top:22px;
}

/* BUTTON */

.btn{
  flex:1;

  height:54px;

  border:none;

  border-radius:20px;

  font-size:15px;
  font-weight:700;
}

/* PRIMARY */

.primary{
  background:linear-gradient(
    135deg,
    #8a2be2,
    #c084fc
  );

  color:white;

  box-shadow:
  0 10px 24px rgba(138,43,226,0.25);
}

/* SECONDARY */

.secondary{
  background:#f2f2f2;

  color:#111;
}

/* HIGHLIGHTS */

.highlights-title{
  margin-top:28px;
  margin-bottom:16px;

  font-size:18px;
  font-weight:800;
}

/* HIGHLIGHTS */

.highlights{
  display:flex;
  gap:14px;

  overflow-x:auto;

  scrollbar-width:none;
}

.highlights::-webkit-scrollbar{
  display:none;
}

/* HIGHLIGHT ITEM */

.highlight{
  min-width:82px;
  text-align:center;
}

.highlight img{
  width:78px;
  height:78px;

  border-radius:26px;

  object-fit:cover;

  padding:3px;

  background:linear-gradient(
    135deg,
    #8a2be2,
    #d8b4fe
  );
}

.highlight p{
  margin-top:7px;

  font-size:12px;
  font-weight:600;
}

/* CONTENT TABS */

.tabs{
  margin-top:28px;

  background:white;

  border-radius:24px;

  padding:15px;

  display:flex;
  justify-content:space-around;

  box-shadow:
  0 6px 18px rgba(0,0,0,0.04);
}

/* TAB */

.tab{
  font-size:26px;
  color:#999;
}

/* ACTIVE TAB */

.active-tab{
  color:#8a2be2;
  transform:translateY(-2px);
}

/* POSTS */

.posts{
  margin-top:18px;

  display:grid;
  grid-template-columns:repeat(3,1fr);

  gap:8px;
}

/* POST IMAGE */

.posts img{
  width:100%;
  height:160px;

  object-fit:cover;

  border-radius:20px;
}

/* BOTTOM NAV */

.bottom-nav{
  position:fixed;
  bottom:0;

  width:100%;
  height:84px;

  background:rgba(255,255,255,0.96);
  backdrop-filter:blur(14px);

  border-top:1px solid #ececec;

  display:flex;
  justify-content:space-around;
  align-items:center;
}

/* NAV */

.nav-item{
  font-size:28px;
  color:#999;
}

/* ACTIVE */

.active{
  color:#8a2be2;
}

/* CREATE BUTTON */

.create{
  width:60px;
  height:60px;

  border-radius:22px;

  background:linear-gradient(
    135deg,
    #8a2be2,
    #c084fc
  );

  display:flex;
  justify-content:center;
  align-items:center;

  color:white;
  font-size:35px;

  margin-top:-40px;

  box-shadow:
  0 12px 28px rgba(138,43,226,0.3);
}

/* ANIMATION */

@keyframes fadeUp{

  from{
    opacity:0;
    transform:translateY(12px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

  <div class="title">
    Your Profile
  </div>

  <div class="header-icons">
    <div>⚙️</div>
    <div>☰</div>
  </div>

</div>

<!-- PROFILE -->

<div class="profile">

  <!-- PROFILE CARD -->

  <div class="profile-card">

    <!-- TOP -->

    <div class="profile-top">

      <div class="profile-image">

        <img src="https://i.pravatar.cc/300?img=15">

        <div class="status"></div>

      </div>

      <div class="profile-info">

        <div class="name">
          Mega Creator
        </div>

        <div class="username">
          @megachatgo
        </div>

        <div class="bio">
          Creating futuristic social experiences with MegaChat Go 🚀
        </div>

      </div>

    </div>

    <!-- NOTE -->

    <div class="note">

      <div class="note-icon">
        ✨
      </div>

      <div class="note-text">
        Building the next generation of conversations.
      </div>

    </div>

    <!-- STATS -->

    <div class="stats">

      <div class="stat">

        <div class="stat-number">
          248
        </div>

        <div class="stat-label">
          Posts
        </div>

      </div>

      <div class="stat">

        <div class="stat-number">
          18.2K
        </div>

        <div class="stat-label">
          Followers
        </div>

      </div>

      <div class="stat">

        <div class="stat-number">
          620
        </div>

        <div class="stat-label">
          Following
        </div>

      </div>

    </div>

    <!-- BUTTONS -->

    <div class="buttons">

      <button class="btn primary">
        Edit Profile
      </button>

      <button class="btn secondary">
        Share
      </button>

    </div>

  </div>

  <!-- HIGHLIGHTS -->

  <div class="highlights-title">
    Highlights
  </div>

  <div class="highlights">

    <div class="highlight">
      <img src="https://picsum.photos/200?1">
      <p>Travel</p>
    </div>

    <div class="highlight">
      <img src="https://picsum.photos/200?2">
      <p>Music</p>
    </div>

    <div class="highlight">
      <img src="https://picsum.photos/200?3">
      <p>Life</p>
    </div>

    <div class="highlight">
      <img src="https://picsum.photos/200?4">
      <p>Tech</p>
    </div>

  </div>

  <!-- CONTENT TABS -->

  <div class="tabs">

    <div class="tab active-tab">
      ⬜
    </div>

    <div class="tab">
      🎥
    </div>

    <div class="tab">
      ❤️
    </div>

    <div class="tab">
      🔖
    </div>

  </div>

  <!-- POSTS -->

  <div class="posts">

    <img src="https://picsum.photos/300/400?11">
    <img src="https://picsum.photos/300/400?12">
    <img src="https://picsum.photos/300/400?13">
    <img src="https://picsum.photos/300/400?14">
    <img src="https://picsum.photos/300/400?15">
    <img src="https://picsum.photos/300/400?16">

  </div>

</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

  <div class="nav-item">
    🏠
  </div>

  <div class="nav-item">
    💬
  </div>

  <div class="create">
    +
  </div>

  <div class="nav-item">
    🎥
  </div>

  <div class="nav-item active">
    👤
  </div>

</div>

</body>
</html>
