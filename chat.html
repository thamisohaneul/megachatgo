<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>MegaChat Chats</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI,sans-serif;
}

body{
  background:#f6f6f8;
  color:#111;
  overflow-x:hidden;
  min-height:100vh;
}

/* HEADER */

.header{
  position:fixed;
  top:0;
  left:0;
  right:0;

  height:88px;

  background:rgba(255,255,255,.96);

  backdrop-filter:blur(18px);

  border-bottom:1px solid #ececec;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 18px;

  z-index:100;
}

/* TITLE */

.title{
  font-size:30px;
  font-weight:900;
}

/* HEADER SETTINGS */

.header-settings{
  width:52px;
  height:52px;

  border-radius:18px;

  background:#f3f3f3;

  display:flex;
  justify-content:center;
  align-items:center;

  transition:.25s ease;
}

.header-settings img{
  width:24px;
  height:24px;
}

.header-settings:active{
  transform:scale(.96);
}

/* CONTENT */

.content{
  padding:108px 18px 130px;
}

/* SEARCH */

.search-box{
  background:white;

  height:62px;

  border-radius:24px;

  display:flex;
  align-items:center;

  padding:0 18px;

  box-shadow:
  0 8px 24px rgba(0,0,0,.04);

  margin-bottom:24px;
}

.search-icon{
  font-size:22px;
  color:#8a2be2;
}

.search-box input{
  flex:1;

  border:none;
  outline:none;

  background:transparent;

  margin-left:12px;

  font-size:15px;
}

/* ACTIVE USERS */

.active-users{
  display:flex;
  gap:16px;

  overflow-x:auto;

  scrollbar-width:none;

  padding-bottom:6px;
}

.active-users::-webkit-scrollbar{
  display:none;
}

/* USER */

.user{
  min-width:78px;

  text-align:center;

  transition:.25s ease;
}

/* RING */

.user-ring{
  width:78px;
  height:78px;

  border-radius:26px;

  background:linear-gradient(
  135deg,
  #8a2be2,
  #c084fc,
  #d8b4fe
  );

  padding:3px;

  box-shadow:
  0 10px 24px rgba(138,43,226,.18);
}

/* INNER */

.user-inner{
  width:100%;
  height:100%;

  border-radius:24px;

  background:white;

  display:flex;
  justify-content:center;
  align-items:center;
}

/* IMAGE */

.user-inner img{
  width:64px;
  height:64px;

  border-radius:20px;

  object-fit:cover;
}

/* NAME */

.user p{
  margin-top:8px;

  font-size:12px;
  font-weight:700;
}

/* CHAT LIST */

.chat-list{
  margin-top:26px;
}

/* CHAT ITEM */

.chat-item{
  background:white;

  border-radius:30px;

  padding:16px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:16px;

  box-shadow:
  0 8px 24px rgba(0,0,0,.04);

  transition:.25s ease;
}

.chat-left{
  display:flex;
  align-items:center;
  gap:14px;
}

.chat-left img{
  width:66px;
  height:66px;

  border-radius:22px;

  object-fit:cover;
}

.chat-info{
  display:flex;
  flex-direction:column;
}

.username{
  font-size:16px;
  font-weight:800;
}

.message{
  margin-top:6px;

  font-size:13px;

  color:#777;
}

.chat-right{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
}

.time{
  font-size:12px;
  color:#888;
}

.badge{
  margin-top:10px;

  min-width:24px;
  height:24px;

  padding:0 8px;

  border-radius:50px;

  background:#8a2be2;

  color:white;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:12px;
  font-weight:800;
}

/* LYNO FLOAT BUTTON */

.lyno-float{
  position:fixed;

  right:18px;
  bottom:105px;

  width:62px;
  height:62px;

  border-radius:50%;

  background:linear-gradient(
  135deg,
  #8a2be2,
  #c084fc
  );

  padding:3px;

  display:flex;
  justify-content:center;
  align-items:center;

  box-shadow:
  0 12px 30px rgba(138,43,226,.35);

  z-index:200;

  transition:.25s ease;
}

.lyno-float img{
  width:100%;
  height:100%;
  object-fit:cover;

  border-radius:50%;
}

/* BOTTOM NAV */

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;

  height:84px;

  background:rgba(255,255,255,.96);

  backdrop-filter:blur(18px);

  border-top:1px solid #ececec;

  display:flex;
  justify-content:space-around;
  align-items:center;

  z-index:100;
}

/* NAV ITEM */

.nav-item{
  width:52px;
  height:52px;

  border-radius:18px;

  display:flex;
  justify-content:center;
  align-items:center;

  transition:.25s ease;
}

.nav-item img{
  width:24px;
  height:24px;
}

/* ACTIVE */

.active{
  background:#f3e8ff;
}

/* TAP */

.user:active,
.chat-item:active,
.lyno-float:active,
.nav-item:active{
  transform:scale(.96);
}

</style>
</head>

<script>

/* SAVE CHAT PREVIEW */

function updateChatPreview(
id,
name,
picture,
message,
time
){

  let chats =
  JSON.parse(
  localStorage.getItem(
  "megachat_chats"
  )) || []

  let existing =
  chats.find(chat => chat.id === id)

  if(existing){

    existing.message = message
    existing.time = time
    existing.picture = picture
    existing.name = name
    existing.unread =
    (existing.unread || 0) + 1

  }

  else{

    chats.push({

      id:id,
      name:name,
      picture:picture,
      message:message,
      time:time,
      unread:1

    })

  }

  /* NEWEST FIRST */

  chats.sort((a,b)=>
    b.updatedAt - a.updatedAt
  )

  localStorage.setItem(
  "megachat_chats",
  JSON.stringify(chats)
  )

}

/* OPEN CHAT */

function openChat(
name,
picture,
id
){

  localStorage.setItem(
  "chat_user_name",
  name
  )

  localStorage.setItem(
  "chat_user_picture",
  picture
  )

  localStorage.setItem(
  "opened_user_id",
  id
  )

  localStorage.setItem(
  "is_lyno_ai",
  "false"
  )

  /* RESET UNREAD */

  let chats =
  JSON.parse(
  localStorage.getItem(
  "megachat_chats"
  )) || []

  chats.forEach(chat=>{

    if(chat.id === id){

      chat.unread = 0

    }

  })

  localStorage.setItem(
  "megachat_chats",
  JSON.stringify(chats)
  )

  window.location.href =
  "chatroom.html"

}

/* OPEN LYNO AI */

function openLynoAI(){

  localStorage.setItem(
  "chat_user_name",
  "Lyno AI"
  )

  localStorage.setItem(
  "chat_user_picture",
  "logo.png"
  )

  localStorage.setItem(
  "opened_user_id",
  "lyno_ai"
  )

  localStorage.setItem(
  "is_lyno_ai",
  "true"
  )

  window.location.href =
  "chatroom.html"

}

/* RENDER CHAT LIST */

function renderChats(){

  let container =
  document.querySelector(
  ".chat-list"
  )

  container.innerHTML = ""

  let chats =
  JSON.parse(
  localStorage.getItem(
  "megachat_chats"
  )) || []

  /* SORT NEWEST */

  chats.sort((a,b)=>
    b.updatedAt - a.updatedAt
  )

  chats.forEach(chat=>{

    container.innerHTML += `

    <div
    class="chat-item"
    onclick="openChat(
    '${chat.name}',
    '${chat.picture}',
    '${chat.id}'
    )">

      <div class="chat-left">

        <img src="${chat.picture}">

        <div class="chat-info">

          <div class="username">
            ${chat.name}
          </div>

          <div class="message">
            ${chat.message}
          </div>

        </div>

      </div>

      <div class="chat-right">

        <div class="time">
          ${chat.time}
        </div>

        ${
          chat.unread > 0
          ?

          `<div class="badge">
            ${chat.unread}
          </div>`

          : ""
        }

      </div>

    </div>

    `

  })

}

/* INIT */

renderChats()

/* SETTINGS */

function openChatSettings(){

  window.location.href =
  "chatsettings.html"

}

/* NAVIGATION */

function goHome(){

  "home.html"

  "chat.html"

}

function goCreate(){

}

function goBuzz(){

  "buzz.html"

}

function goProfile(){

  "settings.html"

}

</script>
