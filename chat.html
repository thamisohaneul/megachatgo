<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MegaChat Messages</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI,sans-serif;
}

body{
  background:#f7f7f7;
  color:#111;
  overflow-x:hidden;
}

/* HEADER */

.header{
  position:fixed;
  top:0;
  width:100%;
  height:78px;

  background:rgba(255,255,255,0.96);
  backdrop-filter:blur(14px);

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:0 18px;

  border-bottom:1px solid #ececec;

  z-index:100;
}

/* TITLE */

.title{
  font-size:32px;
  font-weight:800;
  letter-spacing:-1px;
}

/* HEADER ICONS */

.header-icons{
  display:flex;
  align-items:center;
  gap:18px;
}

.header-icons div{
  font-size:24px;
}

/* SEARCH */

.search-box{
  margin-top:95px;
  padding:0 16px;
}

.search{
  width:100%;
  height:52px;

  border:none;
  outline:none;

  background:white;

  border-radius:18px;

  padding:0 18px;

  font-size:15px;

  box-shadow:
  0 4px 14px rgba(0,0,0,0.04);
}

/* ACTIVE USERS */

.active-users{
  margin-top:18px;

  display:flex;
  gap:15px;

  overflow-x:auto;

  padding:0 16px 12px;

  scrollbar-width:none;
}

.active-users::-webkit-scrollbar{
  display:none;
}

/* USER */

.active-user{
  min-width:72px;
  text-align:center;
}

.active-avatar{
  position:relative;
}

.active-avatar img{
  width:70px;
  height:70px;

  border-radius:24px;

  object-fit:cover;

  border:3px solid white;

  box-shadow:
  0 6px 16px rgba(0,0,0,0.05);
}

/* ONLINE DOT */

.online{
  position:absolute;
  right:3px;
  bottom:3px;

  width:16px;
  height:16px;

  border-radius:50%;

  background:#8a2be2;

  border:3px solid white;
}

.active-user p{
  margin-top:7px;
  font-size:12px;
  font-weight:500;
}

/* CHAT LIST */

.chat-list{
  padding:10px 14px 110px;
}

/* CHAT ITEM */

.chat{
  background:white;

  border-radius:24px;

  padding:14px;

  margin-bottom:14px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  box-shadow:
  0 4px 16px rgba(0,0,0,0.04);

  animation:fadeUp 0.5s ease;
}

/* LEFT */

.chat-left{
  display:flex;
  align-items:center;
  gap:14px;
}

/* PROFILE */

.chat-avatar{
  position:relative;
}

.chat-avatar img{
  width:62px;
  height:62px;

  border-radius:22px;

  object-fit:cover;
}

/* MESSAGE INFO */

.chat-info{
  display:flex;
  flex-direction:column;
}

.chat-name{
  font-size:16px;
  font-weight:700;
}

.chat-message{
  margin-top:4px;

  font-size:13px;
  color:#777;

  max-width:170px;

  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}

/* RIGHT */

.chat-right{
  text-align:right;
}

/* TIME */

.chat-time{
  font-size:12px;
  color:#888;
}

/* UNREAD */

.unread{
  margin-top:8px;

  width:24px;
  height:24px;

  border-radius:10px;

  background:linear-gradient(
    135deg,
    #8a2be2,
    #c084fc
  );

  display:flex;
  justify-content:center;
  align-items:center;

  color:white;
  font-size:12px;
  font-weight:700;

  margin-left:auto;
}

/* FLOAT BUTTON */

.float-btn{
  position:fixed;
  right:20px;
  bottom:95px;

  width:62px;
  height:62px;

  border-radius:22px;

  background:linear-gradient(
    135deg,
    #8a2be2,
    #c084fc
  );

  display:flex;
  justify-content:center;
  align-items:center;

  color:white;
  font-size:34px;

  box-shadow:
  0 10px 28px rgba(138,43,226,0.3);
}

/* BOTTOM NAV */

.bottom-nav{
  position:fixed;
  bottom:0;

  width:100%;
  height:82px;

  background:rgba(255,255,255,0.97);
  backdrop-filter:blur(12px);

  border-top:1px solid #ececec;

  display:flex;
  justify-content:space-around;
  align-items:center;
}

/* NAV */

.nav-item{
  font-size:28px;
  color:#999;
}

.active{
  color:#8a2be2;
  transform:translateY(-3px);
}

/* ANIMATION */

@keyframes fadeUp{

  from{
    opacity:0;
    transform:translateY(12px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}

</style>
</head>
