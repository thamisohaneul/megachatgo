<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MegaChat Chats</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI,sans-serif;
}

body{
  background:#f6f6f8;
  color:#111;
  overflow-x:hidden;
  min-height:100vh;
}

/* HEADER */

.header{
  position:fixed;
  top:0;
  width:100%;
  height:84px;
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(14px);
  border-bottom:1px solid #ececec;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 18px;
  z-index:100;
}

.title{
  font-size:32px;
  font-weight:900;
}

.content{
  padding:102px 18px 120px;
}

/* CHAT LIST */

.chat-list{
  margin-top:20px;
}

.chat-item{
  background:white;
  border-radius:30px;
  padding:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
  box-shadow:0 8px 24px rgba(0,0,0,.04);
  transition:.25s ease;
}

.chat-item:active{
  transform:scale(.97);
}

.chat-left{
  display:flex;
  align-items:center;
  gap:14px;
}

.chat-left img{
  width:66px;
  height:66px;
  border-radius:22px;
  object-fit:cover;
}

.chat-info{
  display:flex;
  flex-direction:column;
}

.username{
  font-size:16px;
  font-weight:800;
}

.message{
  margin-top:6px;
  font-size:13px;
  color:#777;
}

.chat-right{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
}

.time{
  font-size:12px;
  color:#888;
}

.badge{
  margin-top:10px;
  min-width:24px;
  height:24px;
  padding:0 8px;
  border-radius:50px;
  background:#8a2be2;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:12px;
  font-weight:800;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

  <div class="title">
    Chats
  </div>

</div>

<!-- CONTENT -->

<div class="content">

  <div class="chat-list">

    <!-- ALEX -->

    <div
    class="chat-item"
    onclick="openChat(
    'Alex Morgan',
    'https://i.pravatar.cc/150?img=2',
    'alex_001'
    )">

      <div class="chat-left">

        <img src="https://i.pravatar.cc/150?img=2">

        <div class="chat-info">

          <div class="username">
            Alex Morgan
          </div>

          <div class="message">
            Hey, are you coming today?
          </div>

        </div>

      </div>

      <div class="chat-right">

        <div class="time">
          2m ago
        </div>

        <div class="badge">
          2
        </div>

      </div>

    </div>

    <!-- SARAH -->

    <div
    class="chat-item"
    onclick="openChat(
    'Sarah Lee',
    'https://i.pravatar.cc/150?img=3',
    'sarah_001'
    )">

      <div class="chat-left">

        <img src="https://i.pravatar.cc/150?img=3">

        <div class="chat-info">

          <div class="username">
            Sarah Lee
          </div>

          <div class="message">
            Your post looks amazing 🔥
          </div>

        </div>

      </div>

      <div class="chat-right">

        <div class="time">
          9m ago
        </div>

      </div>

    </div>

    <!-- CHRIS -->

    <div
    class="chat-item"
    onclick="openChat(
    'Chris Noah',
    'https://i.pravatar.cc/150?img=4',
    'chris_001'
    )">

      <div class="chat-left">

        <img src="https://i.pravatar.cc/150?img=4">

        <div class="chat-info">

          <div class="username">
            Chris Noah
          </div>

          <div class="message">
            Let's build something huge 🚀
          </div>

        </div>

      </div>

      <div class="chat-right">

        <div class="time">
          1h ago
        </div>

      </div>

    </div>

  </div>

</div>

<script>

/* OPEN CHATROOM */

function openChat(
name,
picture,
id
){

  localStorage.setItem(
  "chat_user_name",
  name
  )

  localStorage.setItem(
  "chat_user_picture",
  picture
  )

  localStorage.setItem(
  "opened_user_id",
  id
  )

  window.location.href =
  "chatroom.html"

}

</script>

</body>
</html>
