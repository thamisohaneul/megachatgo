<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>MegaChat Chats</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI,sans-serif;
}

body{
  background:#f6f6f8;
  color:#111;
  overflow-x:hidden;
  min-height:100vh;
}

/* HEADER */

.header{
  position:fixed;
  top:0;
  left:0;
  right:0;

  height:88px;

  background:rgba(255,255,255,.96);

  backdrop-filter:blur(18px);

  border-bottom:1px solid #ececec;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 18px;

  z-index:100;
}

/* TITLE */

.title{
  font-size:30px;
  font-weight:900;
}

/* LYNO AI */

.lyno-btn{
  width:54px;
  height:54px;

  border-radius:50%;

  background:linear-gradient(
  135deg,
  #8a2be2,
  #c084fc
  );

  padding:3px;

  box-shadow:
  0 8px 24px rgba(138,43,226,.25);

  display:flex;
  justify-content:center;
  align-items:center;
}

.lyno-btn img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:50%;
}

/* CONTENT */

.content{
  padding:108px 18px 120px;
}

/* SEARCH */

.search-box{
  background:white;

  height:62px;

  border-radius:24px;

  display:flex;
  align-items:center;

  padding:0 18px;

  box-shadow:
  0 8px 24px rgba(0,0,0,.04);

  margin-bottom:24px;
}

.search-icon{
  font-size:22px;
  color:#8a2be2;
}

.search-box input{
  flex:1;

  border:none;
  outline:none;

  background:transparent;

  margin-left:12px;

  font-size:15px;
}

/* ACTIVE USERS */

.active-users{
  display:flex;
  gap:16px;

  overflow-x:auto;

  scrollbar-width:none;

  padding-bottom:6px;
}

.active-users::-webkit-scrollbar{
  display:none;
}

/* USER */

.user{
  min-width:78px;

  text-align:center;

  transition:.25s ease;
}

/* RING */

.user-ring{
  width:78px;
  height:78px;

  border-radius:26px;

  background:linear-gradient(
  135deg,
  #8a2be2,
  #c084fc,
  #d8b4fe
  );

  padding:3px;

  box-shadow:
  0 10px 24px rgba(138,43,226,.18);
}

/* INNER */

.user-inner{
  width:100%;
  height:100%;

  border-radius:24px;

  background:white;

  display:flex;
  justify-content:center;
  align-items:center;
}

/* IMAGE */

.user-inner img{
  width:64px;
  height:64px;

  border-radius:20px;

  object-fit:cover;
}

/* NAME */

.user p{
  margin-top:8px;

  font-size:12px;
  font-weight:700;
}

/* CHAT LIST */

.chat-list{
  margin-top:26px;
}

/* CHAT ITEM */

.chat-item{
  background:white;

  border-radius:30px;

  padding:16px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:16px;

  box-shadow:
  0 8px 24px rgba(0,0,0,.04);

  transition:.25s ease;
}

.chat-left{
  display:flex;
  align-items:center;
  gap:14px;
}

.chat-left img{
  width:66px;
  height:66px;

  border-radius:22px;

  object-fit:cover;
}

.chat-info{
  display:flex;
  flex-direction:column;
}

.username{
  font-size:16px;
  font-weight:800;
}

.message{
  margin-top:6px;

  font-size:13px;

  color:#777;
}

.chat-right{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
}

.time{
  font-size:12px;
  color:#888;
}

.badge{
  margin-top:10px;

  min-width:24px;
  height:24px;

  padding:0 8px;

  border-radius:50px;

  background:#8a2be2;

  color:white;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:12px;
  font-weight:800;
}

/* TAP */

.user:active,
.chat-item:active,
.lyno-btn:active{
  transform:scale(.96);
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

  <div class="title">
    Chats
  </div>

  <!-- LYNO AI -->

  <div
  class="lyno-btn"
  onclick="openLynoAI()">

    <img src="logo.png">

  </div>

</div>

<!-- CONTENT -->

<div class="content">

  <!-- SEARCH -->

  <div class="search-box">

    <div class="search-icon">
      🔍
    </div>

    <input
    type="text"
    placeholder="Ask Lyno AI or Search">

  </div>

  <!-- ACTIVE USERS -->

  <div class="active-users">

    <!-- YOU -->

    <div
    class="user"
    onclick="openChat(
    'You',
    'https://i.pravatar.cc/150?img=1',
    'you_001'
    )">

      <div class="user-ring">

        <div class="user-inner">

          <img src="https://i.pravatar.cc/150?img=1">

        </div>

      </div>

      <p>You</p>

    </div>

    <!-- ALEX -->

    <div
    class="user"
    onclick="openChat(
    'Alex Morgan',
    'https://i.pravatar.cc/150?img=2',
    'alex_001'
    )">

      <div class="user-ring">

        <div class="user-inner">

          <img src="https://i.pravatar.cc/150?img=2">

        </div>

      </div>

      <p>Alex</p>

    </div>

    <!-- SARAH -->

    <div
    class="user"
    onclick="openChat(
    'Sarah Lee',
    'https://i.pravatar.cc/150?img=3',
    'sarah_001'
    )">

      <div class="user-ring">

        <div class="user-inner">

          <img src="https://i.pravatar.cc/150?img=3">

        </div>

      </div>

      <p>Sarah</p>

    </div>

    <!-- CHRIS -->

    <div
    class="user"
    onclick="openChat(
    'Chris Noah',
    'https://i.pravatar.cc/150?img=4',
    'chris_001'
    )">

      <div class="user-ring">

        <div class="user-inner">

          <img src="https://i.pravatar.cc/150?img=4">

        </div>

      </div>

      <p>Chris</p>

    </div>

    <!-- EMMA -->

    <div
    class="user"
    onclick="openChat(
    'Emma Stone',
    'https://i.pravatar.cc/150?img=5',
    'emma_001'
    )">

      <div class="user-ring">

        <div class="user-inner">

          <img src="https://i.pravatar.cc/150?img=5">

        </div>

      </div>

      <p>Emma</p>

    </div>

  </div>

  <!-- CHAT LIST -->

  <div class="chat-list">

    <!-- CHAT -->

    <div
    class="chat-item"
    onclick="openChat(
    'Alex Morgan',
    'https://i.pravatar.cc/150?img=2',
    'alex_001'
    )">

      <div class="chat-left">

        <img src="https://i.pravatar.cc/150?img=2">

        <div class="chat-info">

          <div class="username">
            Alex Morgan
          </div>

          <div class="message">
            Hey, are you coming today?
          </div>

        </div>

      </div>

      <div class="chat-right">

        <div class="time">
          2m ago
        </div>

        <div class="badge">
          2
        </div>

      </div>

    </div>

    <!-- CHAT -->

    <div
    class="chat-item"
    onclick="openChat(
    'Sarah Lee',
    'https://i.pravatar.cc/150?img=3',
    'sarah_001'
    )">

      <div class="chat-left">

        <img src="https://i.pravatar.cc/150?img=3">

        <div class="chat-info">

          <div class="username">
            Sarah Lee
          </div>

          <div class="message">
            Your post looks amazing 🔥
          </div>

        </div>

      </div>

      <div class="chat-right">

        <div class="time">
          9m ago
        </div>

      </div>

    </div>

    <!-- CHAT -->

    <div
    class="chat-item"
    onclick="openChat(
    'Chris Noah',
    'https://i.pravatar.cc/150?img=4',
    'chris_001'
    )">

      <div class="chat-left">

        <img src="https://i.pravatar.cc/150?img=4">

        <div class="chat-info">

          <div class="username">
            Chris Noah
          </div>

          <div class="message">
            Let's build something huge 🚀
          </div>

        </div>

      </div>

      <div class="chat-right">

        <div class="time">
          1h ago
        </div>

      </div>

    </div>

  </div>

</div>

<script>

/* NORMAL CHAT */

function openChat(
name,
picture,
id
){

  localStorage.setItem(
  "chat_user_name",
  name
  )

  localStorage.setItem(
  "chat_user_picture",
  picture
  )

  localStorage.setItem(
  "opened_user_id",
  id
  )

  localStorage.setItem(
  "is_lyno_ai",
  "false"
  )

  window.location.href =
  "chatroom.html"

}

/* LYNO AI CHAT */

function openLynoAI(){

  localStorage.setItem(
  "chat_user_name",
  "Lyno AI"
  )

  localStorage.setItem(
  "chat_user_picture",
  "logo.png"
  )

  localStorage.setItem(
  "opened_user_id",
  "lyno_ai"
  )

  localStorage.setItem(
  "is_lyno_ai",
  "true"
  )

  window.location.href =
  "chatroom.html"

}

</script>

</body>
</html>
