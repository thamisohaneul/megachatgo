<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MegaChat Search</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI,sans-serif;
}

body{
  background:#f6f6f8;
  color:#111;
  overflow-x:hidden;
}

/* HEADER */

.header{
  position:fixed;
  top:0;
  width:100%;
  height:82px;

  background:rgba(255,255,255,0.96);
  backdrop-filter:blur(14px);

  display:flex;
  align-items:center;

  padding:0 16px;

  border-bottom:1px solid #ececec;

  z-index:100;
}

/* SEARCH BAR */

.search-bar{
  width:100%;
  height:58px;

  background:#f3f3f3;

  border-radius:22px;

  display:flex;
  align-items:center;

  padding:0 18px;

  gap:12px;
}

/* SEARCH ICON */

.search-icon{
  font-size:22px;
  color:#8a2be2;
}

/* INPUT */

.search-input{
  flex:1;

  border:none;
  outline:none;

  background:transparent;

  font-size:15px;
}

/* FILTER */

.filter{
  width:42px;
  height:42px;

  border-radius:16px;

  background:white;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:18px;

  box-shadow:
  0 4px 14px rgba(0,0,0,0.04);
}

/* CONTENT */

.content{
  padding:100px 16px 120px;
}

/* TRENDING */

.section-title{
  font-size:15px;
  font-weight:800;

  color:#777;

  margin-bottom:16px;
}

/* TREND CARDS */

.trending{
  display:flex;
  gap:14px;

  overflow-x:auto;

  scrollbar-width:none;

  margin-bottom:28px;
}

.trending::-webkit-scrollbar{
  display:none;
}

/* CARD */

.trend-card{
  min-width:170px;

  height:180px;

  border-radius:30px;

  overflow:hidden;

  position:relative;

  box-shadow:
  0 8px 24px rgba(0,0,0,0.08);

  animation:fadeUp .5s ease;
}

/* CARD IMAGE */

.trend-card img{
  width:100%;
  height:100%;

  object-fit:cover;
}

/* OVERLAY */

.overlay{
  position:absolute;
  inset:0;

  background:
  linear-gradient(
    180deg,
    transparent,
    rgba(0,0,0,0.75)
  );

  display:flex;
  align-items:flex-end;

  padding:18px;
}

/* TREND TEXT */

.trend-text{
  color:white;
}

.trend-title{
  font-size:17px;
  font-weight:800;
}

.trend-posts{
  margin-top:5px;

  font-size:12px;

  opacity:.9;
}

/* PEOPLE */

.people{
  display:flex;
  flex-direction:column;
  gap:16px;
}

/* PERSON */

.person{
  background:white;

  border-radius:28px;

  padding:16px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  box-shadow:
  0 6px 18px rgba(0,0,0,0.04);

  animation:fadeUp .5s ease;
}

/* LEFT */

.person-left{
  display:flex;
  align-items:center;
  gap:14px;
}

/* IMAGE */

.person-left img{
  width:72px;
  height:72px;

  border-radius:24px;

  object-fit:cover;
}

/* INFO */

.info{
  display:flex;
  flex-direction:column;
}

/* NAME */

.name{
  font-size:17px;
  font-weight:800;
}

/* USERNAME */

.username{
  margin-top:5px;

  font-size:13px;

  color:#777;
}

/* STATUS */

.status{
  margin-top:8px;

  font-size:12px;

  color:#8a2be2;

  font-weight:700;
}

/* BUTTON */

.follow-btn{
  height:48px;

  padding:0 22px;

  border:none;

  border-radius:18px;

  background:linear-gradient(
    135deg,
    #8a2be2,
    #c084fc
  );

  color:white;

  font-size:14px;
  font-weight:700;

  box-shadow:
  0 10px 22px rgba(138,43,226,0.2);

  transition:.25s ease;
}

/* EXPLORE GRID */

.grid{
  margin-top:28px;

  display:grid;

  grid-template-columns:repeat(2,1fr);

  gap:14px;
}

/* GRID ITEM */

.grid-item{
  height:210px;

  border-radius:28px;

  overflow:hidden;

  position:relative;

  box-shadow:
  0 6px 18px rgba(0,0,0,0.08);

  animation:fadeUp .5s ease;
}

/* IMAGE */

.grid-item img{
  width:100%;
  height:100%;

  object-fit:cover;
}

/* GRID OVERLAY */

.grid-overlay{
  position:absolute;
  inset:0;

  background:
  linear-gradient(
    180deg,
    transparent,
    rgba(0,0,0,0.7)
  );

  display:flex;
  align-items:flex-end;

  padding:14px;
}

/* GRID TEXT */

.grid-text{
  color:white;

  font-size:14px;
  font-weight:700;

  line-height:1.5;
}

/* BOTTOM NAV */

.bottom-nav{
  position:fixed;
  bottom:0;

  width:100%;
  height:84px;

  background:rgba(255,255,255,0.96);
  backdrop-filter:blur(14px);

  border-top:1px solid #ececec;

  display:flex;
  justify-content:space-around;
  align-items:center;

  z-index:100;
}

/* NAV ITEM */

.nav-item{
  width:52px;
  height:52px;

  border-radius:18px;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:25px;

  color:#999;

  transition:.25s ease;
}

/* ACTIVE */

.active{
  background:#f3ebff;

  color:#8a2be2;

  transform:translateY(-4px);
}

/* ANIMATION */

@keyframes fadeUp{

  from{
    opacity:0;
    transform:translateY(14px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

  <div class="search-bar">

    <div class="search-icon"><img src="search.png"></a>
    </div>

    <input
    class="search-input"
    type="text"
    placeholder="Search Lyno Updates">

    <div class="filter">
      ✨
    </div>

  </div>

</div>

<!-- CONTENT -->

<div class="content">

  <!-- TRENDING -->

  <div class="section-title">
    TRENDING NOW
  </div>

  <div class="trending">

    <div class="trend-card">

      <img src="https://picsum.photos/300/500?1">

      <div class="overlay">

        <div class="trend-text">

          <div class="trend-title">
            Future Design
          </div>

          <div class="trend-posts">
            28K posts
          </div>

        </div>

      </div>

    </div>

    <div class="trend-card">

      <img src="https://picsum.photos/300/500?2">

      <div class="overlay">

        <div class="trend-text">

          <div class="trend-title">
            Mega Trends
          </div>

          <div class="trend-posts">
            14K posts
          </div>

        </div>

      </div>

    </div>

    <div class="trend-card">

      <img src="https://picsum.photos/300/500?3">

      <div class="overlay">

        <div class="trend-text">

          <div class="trend-title">
            AI Creators
          </div>

          <div class="trend-posts">
            9K posts
          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- PEOPLE -->

  <div class="section-title">
    PEOPLE TO FOLLOW
  </div>

  <div class="people">

    <!-- PERSON -->

    <div class="person">

      <div class="person-left">

        <img src="https://i.pravatar.cc/300?img=11">

        <div class="info">

          <div class="name">
            Sarah Kim
          </div>

          <div class="username">
            @sarahkim
          </div>

          <div class="status">
            Creator • Online
          </div>

        </div>

      </div>

      <button class="follow-btn">
        Follow
      </button>

    </div>

    <!-- PERSON -->

    <div class="person">

      <div class="person-left">

        <img src="https://i.pravatar.cc/300?img=12">

        <div class="info">

          <div class="name">
            Alex Carter
          </div>

          <div class="username">
            @alexcarter
          </div>

          <div class="status">
            Designer • Trending
          </div>

        </div>

      </div>

      <button class="follow-btn">
        Follow
      </button>

    </div>

  </div>

  <!-- EXPLORE -->

  <div class="section-title" style="margin-top:30px;">
    EXPLORE
  </div>

  <div class="grid">

    <div class="grid-item">

      <img src="https://picsum.photos/400/500?4">

      <div class="grid-overlay">

        <div class="grid-text">
          Minimal futuristic UI inspiration ✨
        </div>

      </div>

    </div>

    <div class="grid-item">

      <img src="https://picsum.photos/400/500?5">

      <div class="grid-overlay">

        <div class="grid-text">
          Creative photography trends 📸
        </div>

      </div>

    </div>

    <div class="grid-item">

      <img src="https://picsum.photos/400/500?6">

      <div class="grid-overlay">

        <div class="grid-text">
          Viral MegaChat content 🚀
        </div>

      </div>

    </div>

    <div class="grid-item">

      <img src="https://picsum.photos/400/500?7">

      <div class="grid-overlay">

        <div class="grid-text">
          AI future concepts 🤖
        </div>

      </div>

    </div>

  </div>

</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

  <div class="nav-item"><img src="home.png"></a>
  </div>

  <div class="nav-item active"><img src="search.png"></a>
  </div>

  <div class="nav-item"><img src="chat.png"></a>
  </div>

  <div class="nav-item"><img src="buzz.png"></a>
  </div>

  <div class="nav-item"><img src="profile.png"></a>
  </div>

</div>

<script>

/* NAVIGATION */

const navItems = document.querySelectorAll(".nav-item");

navItems.forEach(item=>{

  item.addEventListener("click",()=>{

    navItems.forEach(nav=>{
      nav.classList.remove("active");
    });

    item.classList.add("active");

  });

});

/* FOLLOW BUTTON */

const followBtns = document.querySelectorAll(".follow-btn");

followBtns.forEach(btn=>{

  let followed = false;

  btn.addEventListener("click",()=>{

    followed = !followed;

    if(followed){

      btn.innerHTML = "Following";

      btn.style.background = "#f3ebff";
      btn.style.color = "#8a2be2";
      btn.style.boxShadow = "none";

    }else{

      btn.innerHTML = "Follow";

      btn.style.background =
      "linear-gradient(135deg,#8a2be2,#c084fc)";

      btn.style.color = "white";

    }

  });

});

/* SEARCH EFFECT */

const searchInput = document.querySelector(".search-input");

searchInput.addEventListener("focus",()=>{

  document.querySelector(".search-bar").style.boxShadow =
  "0 0 0 4px rgba(138,43,226,0.12)";

});

searchInput.addEventListener("blur",()=>{

  document.querySelector(".search-bar").style.boxShadow =
  "none";

});

</script>

</body>
</html>
