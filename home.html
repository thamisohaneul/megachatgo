<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MegaChat</title>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MegaChat Go</title>
  
</head>
<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI,sans-serif;
}
<script>
  setTimeout(function() {
    window.location.href = "home.html";
  }, 2000); // 2 seconds
</script>
body{
  background:#fafafa;
  color:#111;
  overflow-x:hidden;
}

/* TOP HEADER */

.header{
  position:fixed;
  top:0;
  width:100%;
  height:72px;

  background:rgba(255,255,255,0.96);
  backdrop-filter:blur(12px);

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:0 18px;

  border-bottom:1px solid #ececec;

  z-index:100;
}

/* LOGO */

.logo{
  font-size:33px;
  font-weight:800;
  letter-spacing:-1px;
}

/* ICONS */

.header-icons{
  display:flex;
  align-items:center;
  gap:18px;

  font-size:24px;
}

/* STORIES */

.stories{
  margin-top:85px;

  display:flex;
  gap:16px;

  overflow-x:auto;

  padding:16px;

  scrollbar-width:none;
}

.stories::-webkit-scrollbar{
  display:none;
}

/* STORY */

.story{
  min-width:76px;
  text-align:center;
}

.story-ring{
  width:76px;
  height:76px;

  border-radius:24px;

  background:linear-gradient(
    135deg,
    #8a2be2,
    #c084fc,
    #d8b4fe
  );

  padding:3px;
}

.story-inner{
  width:100%;
  height:100%;

  border-radius:22px;

  background:white;

  display:flex;
  justify-content:center;
  align-items:center;
}

.story-inner img{
  width:62px;
  height:62px;

  border-radius:18px;
  object-fit:cover;
}

.story p{
  margin-top:8px;
  font-size:12px;
  font-weight:500;
}

/* FEED */

.feed{
  padding:5px 14px 110px;
}

/* POST */

.post{
  background:white;

  border-radius:30px;

  margin-bottom:24px;

  overflow:hidden;

  box-shadow:
  0 4px 18px rgba(0,0,0,0.04);

  animation:fadeUp 0.5s ease;
}

/* POST HEADER */

.post-header{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:15px;
}

.post-user{
  display:flex;
  align-items:center;
  gap:12px;
}

.post-user img{
  width:46px;
  height:46px;

  border-radius:16px;

  object-fit:cover;
}

.username{
  font-size:15px;
  font-weight:700;
}

.location{
  font-size:12px;
  color:#888;
  margin-top:2px;
}

/* IMAGE */

.post-image{
  width:100%;
  height:420px;
  object-fit:cover;
}

/* ACTIONS */

.post-actions{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:16px 18px;
}

.left-actions{
  display:flex;
  gap:18px;
}

.post-actions div{
  font-size:25px;
}

/* LIKES */

.likes{
  padding:0 18px;
  font-size:14px;
  font-weight:600;
}

/* CAPTION */

.caption{
  padding:10px 18px 20px;

  font-size:14px;
  line-height:1.5;
}

.caption b{
  margin-right:5px;
}

/* BOTTOM NAV */

.bottom-nav{
  position:fixed;
  bottom:0;

  width:100%;
  height:82px;

  background:rgba(255,255,255,0.97);
  backdrop-filter:blur(12px);

  border-top:1px solid #ececec;

  display:flex;
  justify-content:space-around;
  align-items:center;
}

/* NAV ITEM */

.nav-item{
  font-size:28px;
  color:#999;
}

/* ACTIVE */

.active{
  color:#8a2be2;
  transform:translateY(-3px);
}

/* FLOAT CREATE */

.create{
  width:58px;
  height:58px;

  border-radius:20px;

  background:linear-gradient(
    135deg,
    #8a2be2,
    #c084fc
  );

  display:flex;
  justify-content:center;
  align-items:center;

  color:white;
  font-size:34px;

  margin-top:-38px;

  box-shadow:
  0 10px 25px rgba(138,43,226,0.35);
}

/* ANIMATION */

@keyframes fadeUp{

  from{
    opacity:0;
    transform:translateY(12px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}

</style>
</head>

<body>

<!-- HEADER -->

  <div class="logo">

  </div>

  </div>

  <div class="story">

      <div class="story-inner">

  </div>

  <div class="story">
    <div class="story-ring">
      <div class="story-inner">

      </div>
    </div>

  </div>

  <div class="story">
    <div class="story-ring">
      <div class="story-inner">
        <img src="https://i.pravatar.cc/150?img=4">
      </div>

</div>

<!-- FEED -->

<div class="feed">

  <!-- POST -->

  <div class="post">

    </div>

    <img
    class="post-image"

    <div class="post-actions">

      <div class="left-actions">

    <div class="caption">
      <b>Mega Creator</b>
      Creating the future of social media with MegaChat Go 🚀

  </div>

</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

  <div class="nav-item active">

  </div>

  <div class="nav-item">
    🔍
  </div>

  <div class="create">
    +
  </div>

  <div class="nav-item">
    🎥
  </div>

  <div class="nav-item">
    👤
  </div>

</div>

</body>
