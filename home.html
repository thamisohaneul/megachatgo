<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MegaChat Home</title>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

const supabase = createClient(
  'https://iafpnqjexmagcoeyfzuq.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhZnBucWpleG1hZ2NvZXlmenVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NDI5MzEsImV4cCI6MjA5NDIxODkzMX0.j-YcA_h842zPWLp0c1bAYlwOW80wrdw5aOH1SW4a9Is'
)

const { data: { user } = await supabase.auth.getUser()
if (!user) window.location.href = "login.html"

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("username").innerText = user.user_metadata.username || user.email
  loadMessages()
  setupRealtime()
})

async function loadMessages() {
  const { data } = await supabase
    .from('messages')
    .select('*')
    .order('created_at', { ascending: true })
    .limit(100)
  
  const chat = document.getElementById("chat")
  chat.innerHTML = ""
  data.forEach(msg => addMessage(msg.username, msg.content, msg.created_at))
}

window.sendMessage = async function() {
  const input = document.getElementById("msg")
  const content = input.value.trim()
  if (!content) return
  
  await supabase.from('messages').insert({
    user_id: user.id,
    username: user.user_metadata.username,
    content: content
  })
  input.value = ""
}

function addMessage(username, content, time) {
  const div = document.createElement("div")
  div.className = "message"
  
  const msgTime = time 
    ? new Date(time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
    : ''
  
  div.innerHTML = `
    <div class="msg-header">
      <span class="msg-user">${username}</span>
      <span class="msg-time">${msgTime}</span>
    </div>
    <div class="msg-content">${content}</div>
  `
  document.getElementById("chat").appendChild(div)
  document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight
}

function setupRealtime() {
  supabase.channel('room1')
    .on('postgres_changes', 
      { event: 'INSERT', schema: 'public', table: 'messages' }, 
      payload => addMessage(payload.new.username, payload.new.content, payload.new.created_at)
    )
    .subscribe()
}

window.logout = async function() {
  await supabase.auth.signOut()
  localStorage.removeItem("megachat_logged_in")
  window.location.href = "login.html"
}

// Send on Enter key
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("msg").addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage()
  })
})
</script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI,sans-serif;
}

body{
  min-height:100vh;
  background: linear-gradient(180deg, #ffffff, #f8f2ff, #ffffff);
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.glow1, .glow2{
  position:absolute;
  border-radius:50%;
  background:#c084fc;
  opacity:.15;
  filter:blur(90px);
}
.glow1{ width:240px; height:240px; top:-80px; left:-60px; }
.glow2{ width:220px; height:220px; bottom:-80px; right:-60px; }

.container{
  width:100%;
  max-width:600px;
  height:90vh;
  background: rgba(255,255,255,0.92);
  backdrop-filter:blur(18px);
  border-radius:38px;
  padding:28px 26px;
  box-shadow: 0 12px 34px rgba(0,0,0,0.06);
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}
.header h2{
  font-size:24px;
  color:#111;
}
.header button{
  padding:8px 16px;
  border:none;
  border-radius:14px;
  background: linear-gradient(135deg, #8a2be2, #c084fc);
  color:white;
  font-weight:700;
  cursor:pointer;
}

#chat{
  flex:1;
  overflow-y:auto;
  background:#f5f3f8;
  border-radius:22px;
  padding:18px;
  margin-bottom:18px;
}

.message{
  margin-bottom:16px;
}
.msg-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:4px;
}
.msg-user{
  font-weight:800;
  color:#8a2be2;
  font-size:14px;
}
.msg-time{
  font-size:12px;
  color:#888;
}
.msg-content{
  font-size:15px;
  color:#333;
  line-height:1.4;
}

.input-row{
  display:flex;
  gap:12px;
}
#msg{
  flex:1;
  height:58px;
  border:none;
  outline:none;
  border-radius:22px;
  background:#f5f3f8;
  padding:0 18px;
  font-size:15px;
}
#msg:focus{
  background:white;
  box-shadow: 0 0 0 4px rgba(138,43,226,0.12);
}
.send-btn{
  width:58px;
  height:58px;
  border:none;
  border-radius:22px;
  background: linear-gradient(135deg, #8a2be2, #c084fc);
  color:white;
  font-size:20px;
  cursor:pointer;
}
</style>
</head>

<body>
<div class="glow1"></div>
<div class="glow2"></div>

<div class="container">
  <div class="header">
    <h2>Welcome <span id="username"></span></h2>
    <button onclick="logout()">Logout</button>
  </div>

  <div id="chat"></div>

  <div class="input-row">
    <input id="msg" placeholder="Type a message">
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>
</body>
</html>
