<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,
initial-scale=1.0,
viewport-fit=cover">

<title>MegaChat Home</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI,sans-serif;
  -webkit-tap-highlight-color:transparent;
}

body{
  background:#f6f6f8;
  color:#111;
  overflow-x:hidden;
}

/* HEADER */

.header{
  position:fixed;
  top:0;
  left:0;
  right:0;

  height:88px;

  background:rgba(255,255,255,.96);

  backdrop-filter:blur(18px);

  border-bottom:1px solid #ececec;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 18px;

  z-index:999;
}

.logo{
  font-size:30px;
  font-weight:900;

  background:linear-gradient(
  135deg,
  #8a2be2,
  #c084fc
  );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.top-icons{
  display:flex;
  align-items:center;
  gap:12px;
}

.top-btn{
  width:50px;
  height:50px;

  border-radius:18px;

  background:#f3f3f3;

  display:flex;
  justify-content:center;
  align-items:center;

  transition:.18s;
}

.top-btn img{
  width:24px;
  height:24px;
}

/* CONTENT */

.content{
  padding:
  108px 16px 120px;
}

/* STATUS BAR */

.status-scroll{
  display:flex;
  gap:14px;

  overflow-x:auto;

  scrollbar-width:none;

  padding-bottom:10px;
}

.status-scroll::-webkit-scrollbar{
  display:none;
}

/* STATUS ITEM */

.status-item{
  min-width:82px;
  text-align:center;
}

.status-ring{
  width:82px;
  height:82px;

  border-radius:28px;

  background:linear-gradient(
  135deg,
  #8a2be2,
  #c084fc,
  #d8b4fe
  );

  padding:3px;

  box-shadow:
  0 10px 24px rgba(138,43,226,.18);
}

.status-inner{
  width:100%;
  height:100%;

  border-radius:24px;

  background:white;

  display:flex;
  justify-content:center;
  align-items:center;
}

.status-inner img{
  width:66px;
  height:66px;

  border-radius:22px;

  object-fit:cover;
}

.status-item p{
  margin-top:8px;

  font-size:12px;
  font-weight:700;
}

/* POSTS */

.feed{
  margin-top:26px;
}

.post{
  background:white;

  border-radius:30px;

  margin-bottom:22px;

  overflow:hidden;

  box-shadow:
  0 10px 24px rgba(0,0,0,.04);
}

.post-top{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:16px;
}

.post-user{
  display:flex;
  align-items:center;
  gap:12px;
}

.post-user img{
  width:54px;
  height:54px;

  border-radius:18px;

  object-fit:cover;
}

.post-name{
  font-size:16px;
  font-weight:800;
}

.post-time{
  margin-top:4px;

  font-size:12px;
  color:#777;
}

.post-image{
  width:100%;
  height:420px;

  object-fit:cover;
}

/* ACTIONS */

.post-actions{
  display:flex;
  justify-content:space-around;
  align-items:center;

  padding:14px 0;
}

.action-btn{
  display:flex;
  align-items:center;
  gap:8px;

  font-size:14px;
  font-weight:700;

  color:#555;

  transition:.18s;

  padding:10px 14px;

  border-radius:18px;
}

.action-btn.active-like{
  color:#8a2be2;
  background:#f3e8ff;
}

.like-count{
  font-size:13px;
}

/* COMMENTS */

.comments-box{
  padding:0 16px 16px;
}

.comment{
  background:#f6f6f8;

  padding:12px 14px;

  border-radius:18px;

  margin-top:10px;

  font-size:13px;
}

.comment-input-wrap{
  display:flex;
  gap:10px;

  margin-top:14px;
}

.comment-input{
  flex:1;

  height:46px;

  border:none;
  outline:none;

  border-radius:16px;

  background:#f3f3f3;

  padding:0 14px;

  font-size:14px;
}

.comment-send{
  width:48px;
  height:46px;

  border-radius:16px;

  background:linear-gradient(
  135deg,
  #8a2be2,
  #c084fc
  );

  color:white;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:20px;
}

/* SHARE SHEET */

.share-sheet{
  position:fixed;
  inset:0;

  background:rgba(0,0,0,.45);

  backdrop-filter:blur(8px);

  z-index:9999;

  display:none;
  justify-content:flex-end;
  flex-direction:column;
}

.share-content{
  background:white;

  border-radius:30px 30px 0 0;

  padding:20px;

  animation:up .2s ease;
}

.share-top{
  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:20px;
}

.share-title{
  font-size:22px;
  font-weight:900;
}

.close-btn{
  width:42px;
  height:42px;

  border-radius:16px;

  background:#f3f3f3;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:22px;
}

.share-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
}

.share-item{
  text-align:center;
}

.share-circle{
  width:64px;
  height:64px;

  margin:auto;

  border-radius:22px;

  background:#f3f3f3;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:28px;

  transition:.18s;
}

.share-item p{
  margin-top:8px;

  font-size:12px;
  font-weight:700;
}

/* BOTTOM NAV */

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;

  height:86px;

  background:rgba(255,255,255,.96);

  backdrop-filter:blur(18px);

  border-top:1px solid #ececec;

  display:flex;
  justify-content:space-around;
  align-items:center;

  z-index:999;
}

.nav-item{
  width:54px;
  height:54px;

  border-radius:18px;

  display:flex;
  justify-content:center;
  align-items:center;

  transition:.18s;
}

.nav-item img{
  width:24px;
  height:24px;
}

.active{
  background:#f3e8ff;
}

/* TAP */

.status-item:active,
.top-btn:active,
.action-btn:active,
.nav-item:active,
.share-circle:active,
.close-btn:active,
.comment-send:active{
  transform:scale(.92);
}

/* ANIMATION */

@keyframes up{

  from{
    transform:translateY(100%);
  }

  to{
    transform:translateY(0);
  }

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

  <div class="logo">
    MegaChat
  </div>

  <div class="top-icons">

    <div
    class="top-btn"
    onclick="openNotifications()">

      <img src="notifications.png">

    </div>

    <div
    class="top-btn"
    onclick="openChats()">

      <img src="chat.png">

    </div>

  </div>

</div>

<!-- CONTENT -->

<div class="content">

  <!-- STATUS -->

  <div class="status-scroll">

    <!-- YOU -->

    <div
    class="status-item"
    onclick="openStatus(
    'You',
    'https://i.pravatar.cc/150?img=1',
    'you_001'
    )">

      <div class="status-ring">

        <div class="status-inner">

          <img src="https://i.pravatar.cc/150?img=1">

        </div>

      </div>

      <p>You</p>

    </div>

    <!-- ALEX -->

    <div
    class="status-item"
    onclick="openStatus(
    'Alex Morgan',
    'https://i.pravatar.cc/150?img=2',
    'alex_001'
    )">

      <div class="status-ring">

        <div class="status-inner">

          <img src="https://i.pravatar.cc/150?img=2">

        </div>

      </div>

      <p>Alex</p>

    </div>

  </div>

  <!-- POSTS -->

  <div class="feed">

    <!-- POST -->

    <div class="post">

      <div class="post-top">

        <div
        class="post-user"
        onclick="openProfile(
        'alex_001'
        )">

          <img src="https://i.pravatar.cc/150?img=2">

          <div>

            <div class="post-name">
              Alex Morgan
            </div>

            <div class="post-time">
              10m ago
            </div>

          </div>

        </div>

      </div>

      <img
      class="post-image"
      onclick="openPostImage(this.src)"
      src="https://picsum.photos/500/700">

      <!-- ACTIONS -->

      <div class="post-actions">

        <!-- LIKE -->

        <div
        id="likeBtn1"
        class="action-btn"
        onclick="likePost(
        '1'
        )">

          ❤️

          <span>
            Like
          </span>

          <span
          class="like-count"
          id="likeCount1">
            21
          </span>

        </div>

        <!-- COMMENT -->

        <div
        class="action-btn"
        onclick="toggleComments(
        '1'
        )">

          💬 Comment

        </div>

        <!-- SHARE -->

        <div
        class="action-btn"
        onclick="openShare(
        'https://picsum.photos/500/700'
        )">

          📤 Share

        </div>

      </div>

      <!-- COMMENTS -->

      <div
      class="comments-box"
      id="comments1"
      style="display:none;">

        <div class="comment">
          Sarah: Amazing post 🔥
        </div>

        <div class="comment">
          Chris: Wow 🔥
        </div>

        <div class="comment-input-wrap">

          <input
          type="text"
          class="comment-input"
          id="commentInput1"
          placeholder="Write comment...">

          <div
          class="comment-send"
          onclick="sendComment(
          '1'
          )">
            ➤
          </div>

        </div>

      </div>

    </div>

  </div>

</div>

<!-- SHARE SHEET -->

<div
class="share-sheet"
id="shareSheet">

  <div class="share-content">

    <div class="share-top">

      <div class="share-title">
        Share
      </div>

      <div
      class="close-btn"
      onclick="closeShare()">
        ✕
      </div>

    </div>

    <div class="share-grid">

      <div
      class="share-item"
      onclick="saveImage()">

        <div class="share-circle">
          💾
        </div>

        <p>Save</p>

      </div>

      <div
      class="share-item"
      onclick="shareToChat()">

        <div class="share-circle">
          💬
        </div>

        <p>Chats</p>

      </div>

      <div
      class="share-item"
      onclick="copyLink()">

        <div class="share-circle">
          🔗
        </div>

        <p>Copy</p>

      </div>

      <div
      class="share-item"
      onclick="shareMore()">

        <div class="share-circle">
          📤
        </div>

        <p>More</p>

      </div>

    </div>

  </div>

</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

  <div
  class="nav-item active"
  onclick="goHome()">

    <img src="home.png">

  </div>

  <div
  class="nav-item"
  onclick="goSearch()">

    <img src="search.png">

  </div>

  <div
  class="nav-item"
  onclick="goCreate()">

    <img src="add.png">

  </div>

  <div
  class="nav-item"
  onclick="goBuzz()">

    <img src="buzz.png">

  </div>

  <div
  class="nav-item"
  onclick="goProfile()">

    <img src="profile.png">

  </div>

</div>

<script>

/* =========================
   STATUS
========================= */

function openStatus(
name,
picture,
id
){

  localStorage.setItem(
  "status_user_name",
  name
  )

  localStorage.setItem(
  "status_user_picture",
  picture
  )

  localStorage.setItem(
  "opened_status_user_id",
  id
  )

  if(id === "you_001"){

    window.location.href =
    "status.html"

  }

  else{

    window.location.href =
    "viewstatus.html"

  }

}

/* =========================
   LIKE SYSTEM
========================= */

let likedPosts = {}

function likePost(id){

  const btn =
  document.getElementById(
  "likeBtn" + id
  )

  const count =
  document.getElementById(
  "likeCount" + id
  )

  let current =
  parseInt(count.innerText)

  if(!likedPosts[id]){

    likedPosts[id] = true

    current++

    btn.classList.add(
    "active-like"
    )

  }

  else{

    likedPosts[id] = false

    current--

    btn.classList.remove(
    "active-like"
    )

  }

  count.innerText =
  current

}

/* =========================
   COMMENTS
========================= */

function toggleComments(id){

  const box =
  document.getElementById(
  "comments" + id
  )

  if(
  box.style.display === "none"
  ){

    box.style.display = "block"

  }

  else{

    box.style.display = "none"

  }

}

function sendComment(id){

  const input =
  document.getElementById(
  "commentInput" + id
  )

  let text =
  input.value.trim()

  if(text === "") return

  const box =
  document.getElementById(
  "comments" + id
  )

  const comment =
  document.createElement(
  "div"
  )

  comment.className =
  "comment"

  comment.innerHTML =
  "You: " + text

  box.insertBefore(
  comment,
  box.children[
  box.children.length - 1
  ]
  )

  input.value = ""

}

/* =========================
   SHARE
========================= */

let currentShareImage = ""

function openShare(image){

  currentShareImage =
  image

  document.getElementById(
  "shareSheet"
  ).style.display =
  "flex"

}

function closeShare(){

  document.getElementById(
  "shareSheet"
  ).style.display =
  "none"

}

/* SAVE IMAGE */

function saveImage(){

  const link =
  document.createElement("a")

  link.href =
  currentShareImage

  link.download =
  "MegaChat_Post.jpg"

  document.body.appendChild(
  link
  )

  link.click()

  document.body.removeChild(
  link
  )

  alert(
  "Image saved to device ✨"
  )

}

/* SHARE CHAT */

function shareToChat(){

  alert(
  "Shared to chats ✨"
  )

}

/* COPY LINK */

function copyLink(){

  navigator.clipboard.writeText(
  currentShareImage
  )

  alert(
  "Link copied ✨"
  )

}

/* MORE */

function shareMore(){

  if(navigator.share){

    navigator.share({

      title:"MegaChat Post",

      url:currentShareImage

    })

  }

}

/* =========================
   IMAGE OPEN
========================= */

function openPostImage(src){

  window.open(
  src,
  "_blank"
  )

}

/* =========================
   PROFILE
========================= */

function openProfile(id){

  localStorage.setItem(
  "opened_profile_id",
  id
  )

  window.location.href =
  "profile.html"

}

/* =========================
   TOP
========================= */

function openChats(){

  window.location.href =
  "chat.html"

}

function openNotifications(){

  window.location.href =
  "notifications.html"

}

/* =========================
   NAVIGATION
========================= */

function goHome(){

  window.location.href =
  "home.html"

}

function goChats(){

  window.location.href =
  "chat.html"

}

function goCreate(){

  window.location.href =
  "createpost.html"

}

function goBuzz(){

  window.location.href =
  "buzz.html"

}

function goProfile(){

  window.location.href =
  "profile.html"

}

</script>

</body>
</html>
