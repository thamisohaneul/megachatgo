<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>MegaChat Chatroom</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI,sans-serif;
}

body{
  background:#0f0f10;
  overflow:hidden;
  color:white;
}

/* HEADER */

.header{
  position:fixed;
  top:0;
  left:0;
  right:0;

  height:86px;

  background:rgba(20,20,22,.95);

  backdrop-filter:blur(18px);

  border-bottom:1px solid rgba(255,255,255,.06);

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 16px;

  z-index:100;
}

/* LEFT */

.left{
  display:flex;
  align-items:center;

  gap:14px;
}

/* BACK */

.back-btn{
  width:44px;
  height:44px;

  border-radius:16px;

  background:#1d1d21;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:22px;

  transition:.25s ease;
}

/* PROFILE */

.profile{
  width:54px;
  height:54px;

  border-radius:20px;

  object-fit:cover;

  border:2px solid #8a2be2;
}

/* USER */

.user-info{
  display:flex;
  flex-direction:column;
}

.username{
  font-size:17px;
  font-weight:900;
}

.status{
  margin-top:4px;

  font-size:12px;

  color:#b9b9b9;
}

/* RIGHT */

.right{
  display:flex;
  align-items:center;

  gap:12px;
}

/* ICON */

.icon{
  width:46px;
  height:46px;

  border-radius:18px;

  background:#1d1d21;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:20px;

  transition:.25s ease;
}

/* CHAT AREA */

.chat-area{
  position:absolute;

  top:86px;
  bottom:100px;
  left:0;
  right:0;

  overflow-y:auto;

  padding:18px 14px;
}

/* MESSAGE */

.message{
  max-width:78%;

  padding:14px 16px;

  border-radius:24px;

  margin-bottom:14px;

  font-size:14px;

  line-height:1.7;

  animation:fade .25s ease;
}

/* RECEIVED */

.received{
  background:#1c1c1f;

  color:white;

  border-bottom-left-radius:8px;
}

/* SENT */

.sent{
  background:linear-gradient(
    135deg,
    #8a2be2,
    #c084fc
  );

  color:white;

  margin-left:auto;

  border-bottom-right-radius:8px;
}

/* TIME */

.time{
  margin-top:8px;

  font-size:11px;

  opacity:.75;

  text-align:right;
}

/* INPUT BAR */

.input-bar{
  position:fixed;

  bottom:0;
  left:0;
  right:0;

  height:100px;

  background:rgba(20,20,22,.96);

  backdrop-filter:blur(18px);

  border-top:1px solid rgba(255,255,255,.06);

  display:flex;
  align-items:center;

  padding:0 14px;

  gap:12px;
}

/* SMALL BUTTON */

.small-btn{
  width:52px;
  height:52px;

  border-radius:20px;

  background:#1d1d21;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:24px;

  transition:.25s ease;
}

/* RECORDING */

.recording{
  background:#ff375f !important;

  animation:pulse 1s infinite;
}

/* INPUT */

.input{
  flex:1;

  height:56px;

  border:none;
  outline:none;

  border-radius:22px;

  background:#1d1d21;

  padding:0 18px;

  color:white;

  font-size:15px;
}

/* SEND */

.send-btn{
  width:56px;
  height:56px;

  border-radius:22px;

  background:linear-gradient(
    135deg,
    #8a2be2,
    #c084fc
  );

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:24px;

  box-shadow:
  0 10px 24px rgba(138,43,226,.28);

  transition:.25s ease;
}

/* ACTIVE */

.icon:active,
.back-btn:active,
.small-btn:active,
.send-btn:active{
  transform:scale(.90);
}

/* ANIMATION */

@keyframes fade{

  from{
    opacity:0;
    transform:translateY(10px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}

@keyframes pulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.06);
  }

  100%{
    transform:scale(1);
  }

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

  <div class="left">

    <div
    class="back-btn"
    onclick="goBack()">
      ←
    </div>

    <img
    class="profile"
    src="https://i.pravatar.cc/150?img=5">

    <div class="user-info">

      <div class="username">
        Mega Creator
      </div>

      <div class="status">
        Active now
      </div>

    </div>

  </div>

  <!-- RIGHT -->

  <div class="right">

    <div
    class="icon"
    onclick="openSettings()">
      ⚙
    </div>

    <div
    class="icon"
    onclick="startVideoCall()"><img src="video-call.png"></a>
    </div>

    <div
    class="icon"
    onclick="startAudioCall()">
      📞
    </div>

  </div>

</div>

<!-- CHAT AREA -->

<div
class="chat-area"
id="chatArea">

  <!-- RECEIVED -->

  <div class="message received">

    Hey 👋 welcome to MegaChat.

    <div class="time">
      09:22
    </div>

  </div>

  <!-- SENT -->

  <div class="message sent">

    This UI looks amazing 🚀

    <div class="time">
      09:23
    </div>

  </div>

</div>

<!-- INPUT BAR -->

<div class="input-bar">

  <!-- PLUS -->

  <div
  class="small-btn"
  onclick="openFiles()">
    ＋
  </div>

  <!-- RECORD -->

  <div
  class="small-btn"
  id="recordBtn"
  onclick="toggleRecording()"><img src2"voice-call.png"></a>
  </div>

  <!-- INPUT -->

  <input
  type="text"
  id="messageInput"
  class="input"
  placeholder="Type a message...">

  <!-- SEND -->

  <div
  class="send-btn"
  onclick="sendMessage()">
    ➤
  </div>

</div>

<script>

/* CHAT */

const chatArea =
document.getElementById("chatArea")

const messageInput =
document.getElementById("messageInput")

const recordBtn =
document.getElementById("recordBtn")

let recording = false

/* TAP EFFECT */

function tapEffect(element){

  element.style.transform =
  "scale(.90)"

  setTimeout(()=>{

    element.style.transform =
    "scale(1)"

  },180)

}

/* BACK */

function goBack(){

  tapEffect(event.currentTarget)

  setTimeout(()=>{

    history.back()

  },180)

}

/* SETTINGS */

function openSettings(){

  tapEffect(event.currentTarget)

  setTimeout(()=>{

    window.location.href =
    "profilesettings.html"

  },180)

}

/* VIDEO CALL */

function startVideoCall(){

  tapEffect(event.currentTarget)

  alert("Starting video call 🎥")

}

/* AUDIO CALL */

function startAudioCall(){

  tapEffect(event.currentTarget)

  alert("Starting audio call 📞")

}

/* OPEN FILES */

function openFiles(){

  tapEffect(event.currentTarget)

  setTimeout(()=>{

    window.location.href =
    "chatfile.html"

  },180)

}

/* RECORDING */

function toggleRecording(){

  tapEffect(recordBtn)

  recording = !recording

  if(recording){

    recordBtn.classList.add(
    "recording")

    recordBtn.innerHTML = "⏺"

    alert("Voice recording started 🎤")

  }

  else{

    recordBtn.classList.remove(
    "recording")

    recordBtn.innerHTML = "🎤"

    alert("Recording stopped")

  }

}

/* SEND MESSAGE */

function sendMessage(){

  const message =
  messageInput.value.trim()

  /* SEND TEXT */

  if(message !== ""){

    const msg =
    document.createElement("div")

    msg.className =
    "message sent"

    msg.innerHTML = `

      ${message}

      <div class="time">
        Just now
      </div>

    `

    chatArea.appendChild(msg)

    messageInput.value = ""

    chatArea.scrollTop =
    chatArea.scrollHeight

  }

  /* SEND VOICE */

  if(recording){

    const voice =
    document.createElement("div")

    voice.className =
    "message sent"

    voice.innerHTML = `

      🎤 Voice message

      <div class="time">
        Sent now
      </div>

    `

    chatArea.appendChild(voice)

    chatArea.scrollTop =
    chatArea.scrollHeight

    recording = false

    recordBtn.classList.remove(
    "recording")

    recordBtn.innerHTML = "🎤"

  }

}

/* ENTER KEY */

messageInput.addEventListener(
"keypress",
function(e){

  if(e.key === "Enter"){

    sendMessage()

  }

})

</script>
<script>

window.onload = function(){

  const userName =
  localStorage.getItem(
    "chat_user_name"
  )

  const userPicture =
  localStorage.getItem(
    "chat_user_picture"
  )

  document.querySelector(
    ".username"
  ).innerHTML = userName

  document.querySelector(
    ".profile"
  ).src = userPicture

}

</script>
</body>
</html>
