<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>MegaChat Ultra Native Panel</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI,sans-serif;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#0f0f10;
}

/* BACKGROUND */

.chat-bg{
  position:relative;
  width:100%;
  height:100vh;

  background:
  linear-gradient(
    180deg,
    #18181b,
    #0f0f10
  );

  overflow:hidden;
}

/* SIDE GRADIENTS */

.chat-bg::before,
.chat-bg::after{
  content:"";
  position:absolute;
  top:0;
  width:120px;
  height:100%;
  pointer-events:none;
  z-index:0;
}

.chat-bg::before{
  left:0;

  background:
  linear-gradient(
    90deg,
    rgba(138,43,226,.18),
    transparent
  );
}

.chat-bg::after{
  right:0;

  background:
  linear-gradient(
    270deg,
    rgba(192,132,252,.18),
    transparent
  );
}

/* BLUR BACKDROP */

.backdrop{
  position:fixed;
  inset:0;

  background:
  rgba(0,0,0,0);

  backdrop-filter:
  blur(0px);

  transition:
  .35s ease;

  z-index:80;
  pointer-events:none;
}

.backdrop.active{
  background:
  rgba(0,0,0,.34);

  backdrop-filter:
  blur(10px);
}

/* FAKE CHAT */

.fake-chat{
  position:relative;
  z-index:2;

  padding:
  100px 16px 140px;
}

.msg{
  max-width:74%;

  padding:
  14px 16px;

  border-radius:24px;

  margin-bottom:14px;

  font-size:14px;

  line-height:1.5;

  animation:
  fade .25s ease;
}

.left{
  background:#1f1f23;
  color:white;

  border-bottom-left-radius:10px;
}

.right{
  background:
  linear-gradient(
    135deg,
    #8a2be2,
    #c084fc
  );

  color:white;

  margin-left:auto;

  border-bottom-right-radius:10px;
}

/* INPUT BAR */

.input-bar{
  position:fixed;

  left:16px;
  right:16px;
  bottom:20px;

  height:64px;

  background:
  rgba(28,28,31,.95);

  backdrop-filter:
  blur(20px);

  border-radius:26px;

  display:flex;
  align-items:center;

  padding:0 14px;

  z-index:10;

  box-shadow:
  0 10px 30px rgba(0,0,0,.25);
}

/* PLUS */

.plus-btn{
  width:46px;
  height:46px;

  border-radius:18px;

  background:
  linear-gradient(
    135deg,
    #8a2be2,
    #c084fc
  );

  display:flex;
  justify-content:center;
  align-items:center;

  color:white;

  font-size:30px;

  transition:.2s ease;
}

.plus-btn:active{
  transform:scale(.9);
}

/* INPUT */

.input{
  flex:1;

  margin-left:14px;

  color:#9ca3af;

  font-size:15px;
}

/* SEND */

.send-btn{
  width:46px;
  height:46px;

  border-radius:18px;

  background:#27272a;

  display:flex;
  justify-content:center;
  align-items:center;

  color:white;

  font-size:20px;
}

/* iOS PANEL */

.send-panel{
  position:fixed;

  left:0;
  right:0;
  bottom:0;

  height:88vh;

  background:
  rgba(255,255,255,.94);

  backdrop-filter:
  blur(30px);

  border-top-left-radius:34px;
  border-top-right-radius:34px;

  z-index:100;

  padding:
  12px 18px 80px;

  overflow-y:auto;

  transform:
  translateY(58%);

  transition:
  transform .38s cubic-bezier(.22,1,.36,1);

  will-change:transform;

  touch-action:none;

  box-shadow:
  0 -10px 40px rgba(0,0,0,.15);
}

/* HANDLE */

.handle-wrap{
  width:100%;
  display:flex;
  justify-content:center;
  padding-bottom:12px;
}

.handle{
  width:54px;
  height:6px;

  border-radius:10px;

  background:#cfcfcf;

  box-shadow:
  0 2px 6px rgba(0,0,0,.08);
}

/* TOP */

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:24px;
}

.title{
  font-size:30px;
  font-weight:900;

  color:#111;

  letter-spacing:-1px;
}

.close{
  width:46px;
  height:46px;

  border-radius:18px;

  background:#f3f4f6;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:20px;

  color:#111;

  transition:.2s ease;
}

.close:active{
  transform:scale(.9);
}

/* GRID */

.grid{
  display:grid;

  grid-template-columns:
  repeat(3,1fr);

  gap:22px 18px;
}

/* ITEM */

.item{
  display:flex;
  flex-direction:column;
  align-items:center;

  transition:.2s ease;
}

.item:active{
  transform:scale(.92);
}

/* ICON */

.icon{
  width:76px;
  height:76px;

  border-radius:30px;

  display:flex;
  justify-content:center;
  align-items:center;

  margin-bottom:12px;

  box-shadow:
  0 12px 28px rgba(0,0,0,.08);
}

.icon img{
  width:34px;
  height:34px;
}

/* COLORS */

.photos{
  background:#f3ebff;
}

.camera{
  background:#ecfeff;
}

.video{
  background:#ffeef1;
}

.audio{
  background:#eafcf4;
  font-size:32px;
}

.files{
  background:#eef4ff;
}

.apps{
  background:#fff6e8;
}

.contact{
  background:#f3f4f6;
}

.location{
  background:#fef3c7;
}

.poll{
  background:#ede9fe;
}

/* TEXT */

.text{
  font-size:13px;
  font-weight:700;
  color:#111827;
}

/* FOOTER */

.footer{
  margin-top:44px;

  padding-bottom:20px;

  display:flex;
  justify-content:center;
}

.from-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.from{
  font-size:10px;
  letter-spacing:2px;
  color:#9ca3af;

  margin-bottom:8px;
}

.row{
  display:flex;
  align-items:center;
  gap:8px;
}

.logo{
  width:26px;
  height:26px;

  border-radius:10px;
}

.lyno{
  font-size:15px;
  font-weight:900;

  color:#8a2be2;
}

/* ANIMATION */

@keyframes fade{

  from{
    opacity:0;
    transform:translateY(10px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}

</style>
</head>

<body>

<div class="chat-bg">

  <div class="backdrop" id="backdrop"></div>

  <!-- CHAT -->
  <div class="fake-chat">

    <div class="msg left">
      Hey 👋 send me the files.
    </div>

    <div class="msg right">
      Sure, sending now 🚀
    </div>

  </div>

  <!-- INPUT -->
  <div class="input-bar">

    <div
    class="plus-btn"
    onclick="openPanel()">
      +
    </div>

    <div class="input">
      Message...
    </div>

    <div class="send-btn">
      ➤
    </div>

  </div>

</div>

<!-- PANEL -->

<div
class="send-panel"
id="panel">

  <div class="handle-wrap">
    <div class="handle"></div>
  </div>

  <div class="top">

    <div class="title">
      Share
    </div>

    <div
    class="close"
    onclick="closePanel()">
      ✕
    </div>

  </div>

  <!-- GRID -->

  <div class="grid">

    <div class="item">
      <div class="icon photos">
        <img src="photos.png">
      </div>
      <div class="text">Photos</div>
    </div>

    <div class="item">
      <div class="icon camera">
        <img src="camera(2).png">
      </div>
      <div class="text">Camera</div>
    </div>

    <div class="item">
      <div class="icon video">
        <img src="youtube.png">
      </div>
      <div class="text">Videos</div>
    </div>

    <div class="item">
      <div class="icon audio">
        🎵
      </div>
      <div class="text">Audio</div>
    </div>

    <div class="item">
      <div class="icon files">
        <img src="folder.png">
      </div>
      <div class="text">Files</div>
    </div>

    <div class="item">
      <div class="icon apps">
        <img src="application.png">
      </div>
      <div class="text">Apps</div>
    </div>

    <div class="item">
      <div class="icon contact">
        <img src="contacts.png">
      </div>
      <div class="text">Contact</div>
    </div>

    <div class="item">
      <div class="icon location">
        <img src="location.png">
      </div>
      <div class="text">Location</div>
    </div>

    <div class="item">
      <div class="icon poll">
        <img src="poll.png">
      </div>
      <div class="text">Poll</div>
    </div>

  </div>

  <!-- FOOTER -->

  <div class="footer">

    <div class="from-wrap">

      <div class="from">
        FROM
      </div>

      <div class="row">

        <img
        class="logo"
        src="logo.png">

        <div class="lyno">
          Lyno
        </div>

      </div>

    </div>

  </div>

</div>

<script>

/* ELEMENTS */

const panel =
document.getElementById("panel")

const backdrop =
document.getElementById("backdrop")

/* STATES */

const SNAP_TOP = 0
const SNAP_MID = 58
const SNAP_BOTTOM = 100

let currentSnap = SNAP_MID

let startY = 0
let currentY = 0

let dragging = false

/* OPEN */

function openPanel(){

  currentSnap = SNAP_MID

  setPanel(SNAP_MID)

  backdrop.classList.add("active")

  vibrate()

}

/* CLOSE */

function closePanel(){

  currentSnap = SNAP_BOTTOM

  setPanel(SNAP_BOTTOM)

  backdrop.classList.remove("active")

  vibrate()

}

/* PANEL POSITION */

function setPanel(percent){

  panel.style.transform =
  `translateY(${percent}%)`

}

/* HAPTIC */

function vibrate(){

  if(navigator.vibrate){

    navigator.vibrate(10)

  }

}

/* START DRAG */

panel.addEventListener(
"touchstart",
e=>{

  dragging = true

  startY =
  e.touches[0].clientY

})

/* MOVE */

panel.addEventListener(
"touchmove",
e=>{

  if(!dragging) return

  currentY =
  e.touches[0].clientY

  let diff =
  currentY - startY

  let vh =
  window.innerHeight

  let percent =
  (diff / vh) * 100

  let next =
  currentSnap + percent

  /* RUBBER BAND */

  if(next < -8){

    next = -8

  }

  if(next > 108){

    next = 108

  }

  panel.style.transition =
  "none"

  panel.style.transform =
  `translateY(${next}%)`

  /* DYNAMIC BLUR */

  let opacity =
  0.34 - (next / 250)

  if(opacity < 0)
  opacity = 0

  backdrop.style.background =
  `rgba(0,0,0,${opacity})`

})

/* END */

panel.addEventListener(
"touchend",
()=>{

  dragging = false

  panel.style.transition =
  "transform .38s cubic-bezier(.22,1,.36,1)"

  const matrix =
  window.getComputedStyle(panel)
  .transform

  const values =
  matrix.match(/matrix.*\((.+)\)/)

  let y = 0

  if(values){

    y =
    parseFloat(
      values[1]
      .split(", ")[5]
    )

  }

  let percent =
  (y / window.innerHeight)
  * 100

  /* SNAP PHYSICS */

  if(percent < 28){

    currentSnap = SNAP_TOP

    backdrop.classList.add(
    "active")

  }

  else if(percent < 78){

    currentSnap = SNAP_MID

    backdrop.classList.add(
    "active")

  }

  else{

    currentSnap = SNAP_BOTTOM

    backdrop.classList.remove(
    "active")

  }

  setPanel(currentSnap)

  vibrate()

})

/* START CLOSED */

setPanel(SNAP_BOTTOM)

</script>

</body>
</html>
