<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>MegaChat Chatroom</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI,sans-serif;
}

body{
  background:#f6f6f8;
  color:#111;
  height:100vh;
  overflow:hidden;
}

/* HEADER */

.header{
  position:fixed;
  top:0;
  left:0;
  right:0;

  height:86px;

  background:rgba(255,255,255,.96);

  backdrop-filter:blur(18px);

  border-bottom:1px solid #ececec;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 16px;

  z-index:100;
}

/* LEFT */

.left{
  display:flex;
  align-items:center;
  gap:14px;
}

/* BACK */

.back-btn{
  width:42px;
  height:42px;

  border-radius:16px;

  background:#f3f3f3;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:22px;

  transition:.25s ease;
}

/* PROFILE */

.profile{
  width:54px;
  height:54px;

  border-radius:20px;

  object-fit:cover;

  border:2px solid #8a2be2;
}

/* USER INFO */

.user-info{
  display:flex;
  flex-direction:column;
}

.username{
  font-size:17px;
  font-weight:900;
}

.status{
  margin-top:4px;

  font-size:12px;

  color:#777;
}

/* RIGHT */

.right{
  display:flex;
  align-items:center;
  gap:10px;
}

/* ICON */

.icon{
  width:42px;
  height:42px;

  border-radius:16px;

  background:#f3f3f3;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:20px;

  transition:.25s ease;
}

.icon img{
  width:22px;
  height:22px;
}

/* CHAT AREA */

.chat-area{
  position:fixed;

  top:86px;
  left:0;
  right:0;
  bottom:84px;

  overflow-y:auto;

  padding:18px 14px 30px;
}

/* MESSAGE */

.message{
  max-width:78%;

  padding:14px 16px;

  border-radius:24px;

  margin-bottom:14px;

  font-size:14px;

  line-height:1.7;

  animation:fade .25s ease;
}

/* RECEIVED */

.received{
  background:white;

  color:#111;

  border-bottom-left-radius:8px;

  box-shadow:
  0 6px 18px rgba(0,0,0,.05);
}

/* SENT */

.sent{
  background:linear-gradient(
    135deg,
    #8a2be2,
    #c084fc
  );

  color:white;

  margin-left:auto;

  border-bottom-right-radius:8px;
}

/* TIME */

.time{
  margin-top:8px;

  font-size:11px;

  opacity:.75;

  text-align:right;
}

/* INPUT BAR */

.input-bar{
  position:fixed;

  bottom:0;
  left:0;
  right:0;

  height:84px;

  background:rgba(255,255,255,.96);

  backdrop-filter:blur(18px);

  border-top:1px solid #ececec;

  display:flex;
  align-items:center;

  padding:0 0px;

  gap:1px;

  z-index:100;
}

/* SMALL BUTTON */

.small-btn{
  width:44px;
  height:44px;

  border-radius:16px;

  background:#f3f3f3;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:20px;

  flex-shrink:0;

  transition:.25s ease;
}

.small-btn img{
  width:22px;
  height:22px;
}

/* RECORDING */

.recording{
  background:#ff375f !important;

  animation:pulse 1s infinite;
}

/* INPUT */

.input{
  flex:1;

  height:48px;

  border:none;
  outline:none;

  border-radius:18px;

  background:#f3f3f3;

  padding:0 16px;

  color:#111;

  font-size:14px;
}

/* SEND */

.send-btn{
  width:48px;
  height:48px;

  border-radius:18px;

  background:linear-gradient(
    135deg,
    #8a2be2,
    #c084fc
  );

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:22px;

  color:white;

  flex-shrink:0;

  box-shadow:
  0 10px 24px rgba(138,43,226,.28);

  transition:.25s ease;
}

/* ACTIVE EFFECT */

.icon:active,
.back-btn:active,
.small-btn:active,
.send-btn:active{
  transform:scale(.92);
}

/* ANIMATION */

@keyframes fade{

  from{
    opacity:0;
    transform:translateY(10px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}

@keyframes pulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.06);
  }

  100%{
    transform:scale(1);
  }

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

  <div class="left">

    <!-- BACK -->

    <div
    class="back-btn"
    onclick="goBack()">
      ←
    </div>

    <!-- PROFILE -->

    <img
    class="profile"
    id="profileImage"
    src="https://i.pravatar.cc/150?img=2">

    <!-- USER -->

    <div class="user-info">

      <div
      class="username"
      id="username">
        Alex Morgan
      </div>

      <div
      class="status"
      id="statusText">
        Active now
      </div>

    </div>

  </div>

  <!-- RIGHT -->

  <div
  class="right"
  id="topIcons">

    <!-- SETTINGS -->

    <div
    class="icon"
    onclick="openSettings()">
      ⚙
    </div>

    <!-- VIDEO -->

    <div
    class="icon"
    id="videoBtn"
    onclick="openVideoCall()">

      <img src="video-call.png">

    </div>

    <!-- AUDIO -->

    <div
    class="icon"
    id="audioBtn"
    onclick="openAudioCall()">
      📞
    </div>

  </div>

</div>

<!-- CHAT AREA -->

<div
class="chat-area"
id="chatArea">

  <div class="message received">

    Hello 👋

    <div class="time">
      09:21
    </div>

  </div>

</div>

<!-- INPUT BAR -->

<div class="input-bar">

  <!-- FILE -->

  <div
  class="small-btn"
  onclick="openFiles()">
    ＋
  </div>

  <!-- RECORD -->

  <div
  class="small-btn"
  id="recordBtn"
  onclick="toggleRecording()">

    <img src="voice-call.png">

  </div>

  <!-- INPUT -->

  <input
  type="text"
  id="messageInput"
  class="input"
  placeholder="Type a message...">

  <!-- SEND -->

  <div
  class="send-btn"
  onclick="sendMessage()">
    ➤
  </div>

</div>

<script>

/* USER DATA */

const userName =
localStorage.getItem(
"chat_user_name"
) || "User"

const userPicture =
localStorage.getItem(
"chat_user_picture"
) || "https://i.pravatar.cc/150?img=2"

const userId =
localStorage.getItem(
"opened_user_id"
) || "default_user"

const isLynoAI =
localStorage.getItem(
"is_lyno_ai"
) === "true"

/* ELEMENTS */

const username =
document.getElementById(
"username"
)

const profileImage =
document.getElementById(
"profileImage"
)

const statusText =
document.getElementById(
"statusText"
)

const chatArea =
document.getElementById(
"chatArea"
)

const messageInput =
document.getElementById(
"messageInput"
)

const recordBtn =
document.getElementById(
"recordBtn"
)

const videoBtn =
document.getElementById(
"videoBtn"
)

const audioBtn =
document.getElementById(
"audioBtn"
)

let recording = false

/* LOAD USER */

window.onload = function(){

  username.innerHTML =
  userName

  profileImage.src =
  userPicture

  /* LYNO AI MODE */

  if(isLynoAI){

    statusText.innerHTML =
    "with Lyno v1"

    videoBtn.style.display =
    "none"

    audioBtn.style.display =
    "none"

  }

  else{

    statusText.innerHTML =
    "Active now"

  }

  loadConversation()

}

/* SAVE MESSAGE */

function saveMessage(
content,
side="sent"
){

  const messages =
  JSON.parse(
    localStorage.getItem(
    "chat_" + userId
    )
  ) || []

  messages.push({

    content:content,

    side:side,

    time:new Date().toLocaleTimeString([],{
      hour:"2-digit",
      minute:"2-digit"
    })

  })

  localStorage.setItem(

    "chat_" + userId,

    JSON.stringify(messages)

  )

}

/* LOAD CHAT */

function loadConversation(){

  chatArea.innerHTML = ""

  const messages =
  JSON.parse(
    localStorage.getItem(
    "chat_" + userId
    )
  ) || []

  messages.forEach(msg=>{

    const div =
    document.createElement("div")

    div.className =
    "message " + msg.side

    div.innerHTML = `

      ${msg.content}

      <div class="time">
        ${msg.time}
      </div>

    `

    chatArea.appendChild(div)

  })

  chatArea.scrollTop =
  chatArea.scrollHeight

}

/* SEND */

function sendMessage(){

  const text =
  messageInput.value.trim()

  if(text !== ""){

    saveMessage(
    text,
    "sent"
    )

    messageInput.value = ""

    loadConversation()

  }

}

/* RECORD */

function toggleRecording(){

  recording = !recording

  if(recording){

    recordBtn.classList.add(
    "recording"
    )

    recordBtn.innerHTML =
    "⏺"

  }

  else{

    recordBtn.classList.remove(
    "recording"
    )

    recordBtn.innerHTML =
    '<img src="voice-call.png">'

  }

}

/* ENTER */

messageInput.addEventListener(
"keypress",
function(e){

  if(e.key === "Enter"){

    sendMessage()

  }

})

/* NAVIGATION */

function goBack(){

  window.location.href =
  "chat.html"

}

function openSettings(){

  if(isLynoAI){

    window.location.href =
    "AIsettings.html"

  }

  else{

    window.location.href =
    "profilesettings.html"

  }

}

function openAudioCall(){

  window.location.href =
  "audiocall.html"

}

function openVideoCall(){

  window.location.href =
  "videocall.html"

}

function openFiles(){

  window.location.href =
    "chatfile.html"

}

</script>

</body>
</html>
