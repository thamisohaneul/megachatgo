<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MegaChat Go Loading</title>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MegaChat Go</title>
  
</head>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI,sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ffffff,#f2f2f2,#e9e9e9);
  overflow:hidden;
}

/* Main Screen */
.splash{
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* Logo Box */
.logo-box{
  width:180px;
  height:180px;
  border-radius:40px;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(20px);
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:
    0 10px 40px rgba(0,0,0,0.08),
    inset 0 1px 2px rgba(255,255,255,0.8);
    
  animation:float 3s ease-in-out infinite;
}

/* Logo */
.logo-box img{
  width:110px;
  height:110px;
  object-fit:contain;
}

/* Floating Animation */
@keyframes float{
  0%{
    transform:translateY(0px);
  }
  50%{
    transform:translateY(-10px);
  }
  100%{
    transform:translateY(0px);
  }
}

/* Loading Dots */
.loading{
  display:flex;
  gap:8px;
  margin-top:35px;
}

.loading span{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#000;
  animation:bounce 1.2s infinite;
}

.loading span:nth-child(2){
  animation-delay:0.2s;
}

.loading span:nth-child(3){
  animation-delay:0.4s;
}

@keyframes bounce{
  0%,80%,100%{
    transform:scale(0.5);
    opacity:0.4;
  }
  40%{
    transform:scale(1);
    opacity:1;
  }
}

/* Bottom Branding */
.footer{
  position:absolute;
  bottom:45px;
  display:flex;
  flex-direction:column;
  align-items:center;
  animation:fadeIn 2s ease;
}

.from{
  font-size:15px;
  color:#999;
  margin-bottom:8px;
}

/* Lyno Row */
.lyno-row{
  display:flex;
  align-items:center;
  gap:10px;
}

.lyno-row img{
  width:28px;
  height:28px;
  border-radius:50%;
}

.lyno-row span{
  font-size:28px;
  color:#000;
  font-weight:500;
}

/* Fade Animation */
@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

</style>
</head>

<body>

<div class="splash">

  <!-- Center Logo -->
  <div class="logo-box">
    <img src="logo.png" alt="MegaChat Logo">
  </div>

  <!-- Loading -->
  <div class="loading">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <!-- Bottom Branding -->
  <div class="footer">

    <div class="from">from</div>

    <div class="lyno-row">
      <img src="logo.png" alt="Lyno Logo">
      <span>Lyno</span>
    </div>

  </div>

</div>

</body>
</html>
